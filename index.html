<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demand Planning Global Process Standardization</title>

    <style>
        :root {
            --primary-green: #2E7D32;   
            --accent-green: #00C853;    
            --bg-warm-white: #FAF9F6;   
            --pure-white: #FFFFFF;      
            --card-has-img: #E0E4E0;    /* Grey for cards WITH process maps */
            --text-dark-green: #1B5E20; 
            --border-soft: #E0E4E0;     
            --lucid-blue: #2979FF; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-warm-white);
            color: var(--primary-green);
            padding: 60px 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            color: var(--primary-green);
            font-size: 2.4rem;
            letter-spacing: 1.5px;
            font-weight: 700;
            line-height: 1.4;
            text-transform: uppercase;
        }

        /* AI 助理按鈕樣式 */
        .ai-chat-trigger {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 28px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(46, 125, 50, 0.2);
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .ai-chat-trigger:hover { 
            transform: translateY(-2px); 
            background-color: #1B5E20;
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.3);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .process-card {
            border: 2px solid var(--border-soft);
            border-radius: 14px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.03);
            min-height: 140px;
        }

        /* White base style for cards WITHOUT images */
        .process-card.no-image {
            background-color: var(--pure-white);
        }

        /* Grey base style for cards WITH images */
        .process-card.has-image {
            background-color: var(--card-has-img);
        }

        .process-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-green);
            box-shadow: 0 12px 24px rgba(46, 125, 50, 0.08);
            background-color: #F4FAF4; 
        }

        .process-card .step-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--primary-green);
            line-height: 1.4;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(27, 94, 32, 0.4); 
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--pure-white);
            border: 1px solid var(--border-soft);
            width: 92%;
            max-width: 1000px; 
            height: 85vh;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 24px 50px rgba(0,0,0,0.15);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 24px 35px;
            border-bottom: 1px solid var(--border-soft);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #F7F9F7;
        }

        .modal-header h2 {
            color: var(--primary-green);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2.2rem;
            cursor: pointer;
            color: #A0A5A0;
            transition: color 0.2s;
            line-height: 1;
        }

        .close-btn:hover {
            color: var(--accent-green);
        }

        .modal-body {
            padding: 35px;
            overflow-y: auto; 
            flex: 1;
            display: flex;
            flex-direction: column; 
            gap: 30px; 
        }

        .modal-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #FAFAFA;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-soft);
        }

        .toolbar-group {
            display: flex;
            gap: 10px;
        }

        .text-content-area {
            color: #333333;
            line-height: 1.6;
            font-size: 1.05rem;
            background: #FFFFFF;
            padding: 10px 5px;
        }

        .text-content-area h3 {
            color: var(--primary-green);
            margin: 25px 0 10px 0;
            font-size: 1.3rem;
            border-bottom: 1px solid #E8EBE8;
            padding-bottom: 5px;
        }

        .text-content-area h4 {
            color: var(--text-dark-green);
            margin: 15px 0 8px 0;
            font-size: 1.15rem;
            font-weight: 600;
        }

        .text-content-area h3:first-child {
            margin-top: 0;
        }

        .text-content-area p {
            margin-bottom: 12px;
        }

        .text-content-area ul {
            margin-left: 25px;
            margin-bottom: 15px;
        }

        .text-content-area li {
            margin-bottom: 6px;
        }

        .image-outer-wrapper {
            background: #FAFAFA;
            border-radius: 12px;
            border: 1px solid var(--border-soft);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        .zoom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--pure-white);
            padding: 8px 15px;
            border-radius: 6px;
            border: 1px solid var(--border-soft);
        }

        .zoom-btn-group {
            display: flex;
            gap: 10px;
        }

        .zoom-control-btn {
            background-color: transparent;
            color: var(--primary-green);
            border: 1px solid var(--primary-green);
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .zoom-control-btn:hover {
            background-color: var(--primary-green);
            color: var(--pure-white);
        }

        .edit-doc-btn {
            background-color: var(--primary-green) !important;
            color: white !important;
            border: 1px solid var(--primary-green) !important;
        }
        .edit-doc-btn:hover {
            background-color: #1B5E20 !important;
        }

        .lucid-link-btn {
            background-color: var(--lucid-blue) !important;
            color: white !important;
            border: 1px solid var(--lucid-blue) !important;
        }
        .lucid-link-btn:hover {
            background-color: #1565C0 !important;
        }

        .image-scroll-box {
            overflow-y: visible;    
            overflow-x: auto;       
            background: #FFFFFF;
            border: 1px solid #EEEEEE;
            border-radius: 6px;
            padding: 10px;
            position: relative;
        }

        .process-image {
            width: 100%;            
            height: auto;
            display: block;
            margin: 0 auto;
            transition: transform 0.2s ease; 
            transform-origin: top center;    
        }

        .discussion-box {
            margin-top: 20px;
            padding-top: 25px;
            border-top: 2px solid var(--border-soft);
        }
        .discussion-box h3 {
            font-size: 1.3rem;
            color: var(--primary-green);
            margin-bottom: 20px;
        }
    </style>
</head>

    <script>
        // GitHub 儲存庫路徑
        const githubRawBaseUrl = "https://raw.githubusercontent.com/wlee5-design/demand-planning/main/contents/";

        const stepsData = [
            { 
                id: 1, 
                title: "ASP management", 
                editUrl: "https://docs.google.com/document/d/1G3Soa58AG3H-IbX6xaDrlLJq1mg5dRRFubhCcTdRCTI/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/680b898a-5f3b-4c4b-9209-b582c8e9a1d1/edit?viewport_loc=105%2C-72%2C3517%2C1615%2Ct5f0BNooez5S3&invitationId=inv_269e195c-87ce-4f8a-9f89-c40413f9da37", 
                imgSrc: "ASP management@.png",
                contentFile: "ASP Management words.html",  // 💡 檔名已成功修改為 ASP Management words.html
            },
            { 
                id: 2, 
                title: "WOH management", 
                editUrl: "https://docs.google.com/document/d/17B6Zf2H1yo3WEMMyjr_P9ufp7ZsYnruQMfWtJkd1F1c/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/14f54d95-586a-419f-a2d2-db04a7a3eab6/edit?viewport_loc=28%2C304%2C1781%2C818%2Ckfud8kSUKrbUF&invitationId=inv_3ccce988-a35f-41c3-8699-9ec60ee64d2e", 
                imgSrc: "WOH Management @.png",
                htmlContent: `
                    <h3>🎯 Purpose</h3>
                    <p>To establish a standardized, cross-functional collaboration mechanism for defining, aligning, and executing Week on Hand (WOH) Targets across markets. This ensures full synchronization among Demand Planning (DP), Finance, and Customer Supply Chain (CSC), grounding Finance's Gross Revenue(GR) Plan and CSC's Order Fulfillment in a unified inventory target to maximize operational and financial efficiency.</p>
                    <h3>📘 Definition & Key Terms</h3>
                    <ul>
                        <li><strong>WOH (Week on Hand):</strong> Inventory target measured in weeks, indicating how many weeks of future demand the current inventory level can sustain.</li>
                        <li><strong>Supercluster:</strong> The highest level of regional segmentation within Logitech (e.g., APM, GCN, NAM, LAT, EURO).</li>
                        <li><strong>Customer Group / Subgroup:</strong> Customer-based segmentation (e.g., specific key account categories, or specific countries/markets like Taiwan, Hong Kong, Japan).</li>
                        <li><strong>Product Line (PL) / Product Group (PG):</strong> Product-based segmentation (e.g., Gaming, PWS, Canova).</li>
                        <li><strong>ABC Classification:</strong> A framework that categorizes products into A, B, or C levels based on their strategic importance, typically driven by sales volume or value contribution.</li>
                    </ul>
                    <h3>💡 Importance</h3>
                    <ul>
                        <li><strong>Alignment of Financial and Operational Metrics:</strong> WOH targets directly influence Finance’s financial targets, inventory targets, and the GR Plan, as well as CSC’s replenishment and order execution. Failing to align upfront results in a disconnect between financial budgeting and actual supply chain operations.</li>
                        <li><strong>Market-Tailored Flexibility:</strong> Because planning logic varies across global markets (e.g., North America focuses heavily on major retailers, while Asia-Pacific focuses on country-specific dynamics and strategic products), the WOH framework must support multi-dimensional configurations to prevent one-size-fits-all stockouts or inventory piles.</li>
                    </ul>
                    <h3>⚙️ Planning Logic</h3>
                    <p><strong>Multi-Dimensional Flexibility:</strong> WOH targets should be defined at the most appropriate granularity depending on business needs (ranging broadly from the Supercluster level down to a specific Customer like Best Buy or an individual SKU), rather than sequentially passing through every single level.</p>
                    <p><strong>Market-Practice Driven Constraints:</strong></p>
                    <ul>
                        <li><strong>NAM:</strong> Primarily driven by Customer Group level.</li>
                        <li><strong>APM / GCN:</strong> Does not strictly enforce ABC classification; certain "C items" may require a higher WOH target due to specific country or customer requirements to avoid stockouts.</li>
                        <li><strong>Emerging Market:</strong> Retains ABC Classification as part of the core logic.</li>
                        <li><strong>EURO:</strong> Tends to be managed at the Category / Product Line level.</li>
                    </ul>
                `
            },
            { 
                id: 3, 
                title: "Return Rate management", 
                editUrl: "https://docs.google.com/document/d/1OP1Rp0VF4pVpvj7cIlMXDXHEP6bJcYMhs-mXPAle6fE/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/e20529ab-eda4-483f-b733-7606bf152c6f/edit?viewport_loc=-111%2C139%2C2159%2C991%2C7pF14CYle6Yij&invitationId=inv_afb404d8-41b5-4b7a-9a58-def3c8263ee6", 
                imgSrc: "Return Rate management@.png",
                htmlContent: `
                    <h3>🎯 Purpose</h3>
                    <p>To align product return parameters between Demand Planning and Finance/CCM, establishing unified data rules to drive precise Gross Revenue (GR) planning and supply tracking cycles.</p>
                    <h3>⚙️ Alignment Guideline</h3>
                    <p><strong>Return Rate Alignment made with Finance/CCM:</strong> Ensure Finance uses the exact same Return Rate figures to drive the GR Plan calculation, avoiding alignment discrepancies across teams.</p>
                    <h3>🔍 Review and Update Frequency</h3>
                    <ul>
                        <li><strong>Standard Cycle:</strong> Reviewed and updated in <strong>Week 1 of each Quarter</strong>.</li>
                        <li><strong>AOP Exception Note:</strong> Finance typically defines it once a year in the Annual Operational Plan (AOP)—normally setting higher return rates during Q3 and Q4 cycles.</li>
                    </ul>
                    <h3>❓ Open Questions</h3>
                    <p><strong>Q:</strong> Current Return Rate is applied in SI DP starting via conversion, but return is applicable to total shipment units out of Logitech to the customer. Should it be stacked on top of SI DP consensus (including SI DP overrides and events)?</p>
                    <p><strong>A: Yes.</strong></p>
                `
            },
            { 
                id: 4, 
                title: "DCS/SI carryover", 
                editUrl: "https://docs.google.com/document/d/1V3RCdP_6TSkLc8WPpcx8EM1K7YEAZcO214qX9gRpTcA/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/773793f6-4abd-441c-bbf4-2d8cc1e5620c/edit?viewport_loc=240%2C305%2C3476%2C1596%2C5rtcIwgxVf2ml&invitationId=inv_304f2d92-3fc7-48f4-9b33-ab0e2a77fec1", 
                imgSrc: "DCS SI Carryover@.png",
                htmlContent: `
                    <h3>🎯 Purpose</h3>
                    <p>To ensure the Weekly Supply Plan aligns with the Quarterly Commercial Commitment by preventing unintentional loss of unfulfilled demand.</p>
                    <h3>📘 Definition</h3>
                    <p><strong>DCS Carryover</strong> is the process of reassigning unconsumed forecasts to future periods. It prevents forecast drop when shipments do not occur as planned in a specific week, ensuring that the total quarterly commitment remains intact.</p>
                    <h3>💡 Importance</h3>
                    <ul>
                        <li><strong>System Disaggregation:</strong> Although we input forecasts on a quarterly or monthly basis, the system automatically disaggregates these numbers into weekly plans for supply planning.</li>
                        <li><strong>Preventing Forecast Erosion:</strong> If actual shipments fall short of the weekly forecast and the system simply discards the unfulfilled portion, the total demand plan will continuously shrink.</li>
                    </ul>
                    <p><strong>Example Scenario:</strong><br>
                    • Quarterly Commitment: $10M<br>
                    • Situation: Shipments in the early weeks are lower than the weekly forecast.<br>
                    • Risk: Without a Carryover mechanism, the total Demand Plan might drop to $7M, even though the Sales/Commercial teams are still committed to the original $10M target.</p>
                    <h3>⚙️ Logic & Strategic Assessment</h3>
                    <p>DCS Carryover is not an automatic process. It requires a strategic assessment based on the following two criteria:</p>
                    <h4>1. Nature of the Demand: Delay vs. Decline</h4>
                    <ul>
                        <li><strong>Case for Carryover (Delay):</strong> If the shortfall is caused by a temporary shift—such as a customer ordering late, supply constraints, or a delayed promotional event—the volume should be carried over.</li>
                        <li><strong>Case for Reduction (Decline):</strong> If the market demand is weakening or the product has lost its competitive edge, the forecast should be revised downward instead of being carried over.</li>
                    </ul>
                    <h4>2. Market Segmentation</h4>
                    <p><strong>● Mature Markets (NAM, Europe, ANZ, Japan):</strong><br>
                    Mature markets are primarily market-driven, meaning consumption patterns closely reflect actual end-user demand. Therefore, the default rule for these regions is: <strong>No Carryover by Default</strong>.</p>
                    <p><u>Exceptions (Criteria for Carryover):</u> permitted only when clear evidence proves the demand is delayed, not lost:</p>
                    <ul>
                        <li>Large-scale Events: Significant spikes such as Prime Day or Black Friday.</li>
                        <li>Order Timing: Explicit customer delays in placing purchase orders (POs).</li>
                        <li>Supply Constraints: Production or allocation issues that prevented fulfillment.</li>
                        <li>Logistics/Shipment Delays: Goods are ready but delayed in transit.</li>
                        <li>Commercial Validation: Formal confirmation from Sales/Commercial teams that the specific demand will resurface within the quarter.</li>
                    </ul>
                    <p><strong>● Emerging Markets (APM, Greater China, Latin America, and others):</strong><br>
                    These regions are often commitment-driven and operate under a push-based model. In these markets, the quarterly target (e.g. $10M) is a firm commercial promise. Even if shipments are slow in the early weeks, the volume is expected to be recovered through aggressive sales activities toward the end of the period. Therefore, the default logic for these regions is: <strong>Carryover is Frequently Required</strong>.</p>
                    <p>Demand in these markets is often backloaded (clustering at the end of the month/quarter). If a shortfall occurs early on, it indicates a delay in execution rather than a drop in demand. To ensure the Quarterly Sizing remains intact, unconsumed forecasts are carried over to future weeks.</p>
                    <p><u>Common Scenarios for Carryover:</u></p>
                    <ul>
                        <li>Month-End / Quarter-End Push: Concentrated shipment efforts to meet financial targets.</li>
                        <li>Major Promotional Events: Large-scale campaigns such as the 618 Shopping Festival.</li>
                        <li>Phased Fulfillment: Slow starts compensated by accelerated shipments in later weeks.</li>
                        <li>Commercial Assurance: Formal confirmation that the Quarterly Commitment remains unchanged and achievable.</li>
                    </ul>
                `
            },
            { 
                id: 5, 
                title: "Channel Correction", 
                editUrl: "https://docs.google.com/document/d/1hpaGN1-y2VfXsAxq63jd_QFNQorttk9afXzEY-JqzWo/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/7414911c-0d77-45e6-a1f7-123e049e2ea3/edit?viewport_loc=358%2C225%2C2682%2C1231%2CocMggXGJ3kdmr&invitationId=inv_2144b9a8-54c1-408e-9116-8905e7d2f61f", 
                imgSrc: "Channel Correction@.png", 
                htmlContent: `
                    <h3>🎯 Purpose</h3>
                    <p>To maintain a healthy T1 channel inventory (Weeks on Hand, WOH) and ensure the Sell-in Plan accurately reflects both market demand and actual inventory status.</p>
                    <p><strong>The Sell-in Plan objectives:</strong></p>
                    <ul>
                        <li>Support target inventory levels and maintain healthy channel stock levels.</li>
                        <li>Avoid shortages and overstocking.</li>
                        <li>Smooth out shipment fluctuations.</li>
                    </ul>
                    <h3>📘 Definition & Key Terms</h3>
                    <ul>
                        <li><strong>Channel Correction:</strong> The process of adjusting the Sell-in Plan based on the gap between current inventory and target inventory to calibrate inventory levels and restore channel health.</li>
                        <li><strong>Close the Gap Pacing:</strong> Defines the speed of the inventory correction. Instead of simply changing shipment volumes, it manages how fast inventory returns to its target level (e.g., over 2 weeks vs. 4 weeks) to avoid market shock.</li>
                    </ul>
                    <h3>💡 Importance</h3>
                    <p>Without Channel Correction, critical supply chain issues arise:</p>
                    <ul>
                        <li><strong>Excess Inventory:</strong> Buildup leading to aging/obsolescence risks, cash flow pressure, and warehouse capacity strain.</li>
                        <li><strong>Deficit Inventory:</strong> Severe shortages/stockouts, missed shipments, lost revenue, inability to fulfill customer pull-ins, and order backlog accumulation.</li>
                        <li><strong>Extreme Shipment Volatility:</strong> Missing or overly aggressive corrections cause huge supply spikes, severe shipment fluctuations, factory loading instability, and production bottlenecks.</li>
                    </ul>
                    <h3>⚙️ Calculation Logic & Pacing</h3>
                    <p>Sell-in does not equal DCS. The core formula is:</p>
                    <p style="background:#F4FAF4; padding:10px; border-left:4px solid var(--primary-green); font-weight:bold; margin-bottom:12px;">
                        Sell-in = DCS + Target Inventory - Current Inventory
                    </p>
                    <p><strong>Example Scenario:</strong><br>
                    • DCS: 1,000 | Target Inventory: 800 | Current Inventory: 500<br>
                    • <strong>Sell-in Calculation:</strong> 1,000 + 800 - 500 = 1,300 units.</p>
                    <h4>Smoothing Mechanism: Global Default Close Gap = 30%</h4>
                    <p>It represents the <em>correction speed (pacing rate)</em>, taking approximately 8 weeks to return to target levels gradually to minimize supply chain shock.</p>
                    <ul>
                        <li><strong>30% (Global Default):</strong> Gradual correction to smooth shipment volumes and stabilize factory loading.</li>
                        <li><strong>50% (Moderate Speed):</strong> A balanced approach weighing correction urgency against shipment stability.</li>
                        <li><strong>80% (Aggressive Pacing):</strong> Rapid adjustment typically used for urgent inventory imbalances.</li>
                        <li><strong>100% (Immediate Realignment):</strong> Gap closed instantly, forcing target inventory alignment by the very next week (Risks huge factory shipment spikes/drops).</li>
                    </ul>
                    <h3>📋 Planner Decision Logic</h3>
                    <p>The system provides a baseline; final validation rests with the planner based on:</p>
                    <ul>
                        <li><strong>DCS Demand & Current Inventory:</strong> Verifying true market demand and exact stocks held in T1 channels.</li>
                        <li><strong>Product Importance:</strong> For Strategic SKUs, Class A, or Exclusive items, planners may hold a higher buffer (e.g., increasing WOH from 8 to 10 weeks).</li>
                        <li><strong>Market Trend & Promotions:</strong> Front-loading shipments during launch/promotion periods, or slowing down if market sell-through softens.</li>
                        <li><strong>Customer Ordering Behavior:</strong> Managing distinct regional patterns (Quarterly ordering in TW/KR vs Monthly ordering in JP/HK/ANZ).</li>
                    </ul>
                `
            },
            { 
                id: 6, 
                title: "Backlog management", 
                editUrl: "https://docs.google.com/document/d/1jLRZ_X9qbXQ70LBaU24BE7CKIAZYkkHwRH6A9YHMIvs/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/9832cc5a-e8f6-4543-bb54-23ed982dcc88/edit?viewport_loc=222%2C223%2C2647%2C1215%2ChIdtkivSAJbAd&invitationId=inv_368f83ee-d5ca-41dc-bcf7-a61b9d251677", 
                imgSrc: "Backlog management@.png", 
                htmlContent: `
                    <h3>🎯 Purpose</h3>
                    <ul>
                        <li><strong>Manage Real Signals:</strong> To manage the relationship between actual demand signals and the original forecast, rather than just managing raw orders.</li>
                        <li><strong>Reallocate Demand Visibility:</strong> Consumption fundamentally reallocates demand visibility horizontally instead of artificially increasing total demand volume.</li>
                        <li><strong>Avoid Double Counting:</strong> Consume forecasts with actual orders to prevent system double counting.</li>
                    </ul>
                    <h3>📘 Definition & Key Terms</h3>
                    <ul>
                        <li><strong>Backlog:</strong> Official sell-in orders placed by T1 customers but not yet fully fulfilled by the factory. Backlog represents an <em>"already materialized real demand signal,"</em> while a forecast is just a <em>"planning assumption."</em></li>
                        <li><strong>Forecast Consumption:</strong> A system calculation logic where actual orders replace (consume)—rather than stack onto—the forecast.</li>
                    </ul>
                    <p><strong>System Demand Formula:</strong></p>
                    <p style="background:#F4FAF4; padding:10px; border-left:4px solid var(--primary-green); font-weight:bold;">
                        Total System Demand = Actual Orders + Remaining Forecast
                    </p>
                    <h3>💡 Importance</h3>
                    <p>If Forecast Consumption is skipped, the system treats bulk orders as incremental demand, stacking them onto the original forecast and causing severe issues:</p>
                    <ul>
                        <li><strong>Supply Overestimated:</strong> e.g., Forecast (1k) + Order (1k) = System mistaken demand (2k).</li>
                        <li><strong>Factory Loading Distortion:</strong> Triggers factory overproduction and capacity saturation.</li>
                        <li><strong>Inventory Risk:</strong> Leads to excess inventory and unhealthy Weeks of Supply.</li>
                    </ul>
                    <h3>⚙️ Forecast Consumption Window Logic</h3>
                    <ul>
                        <li><strong>NPI (New Product Introduction):</strong> <strong>Disabled for the first 3 months</strong> due to volatile initial demand patterns.</li>
                        <li><strong>TW & KR (Taiwan & Korea):</strong> <strong>Quarterly Consumption.</strong> Customers heavily front-load full-quarter orders right at the quarter-start.</li>
                        <li><strong>Japan, HK, ANZ:</strong> <strong>Monthly Rolling Window (-1 to +3 weeks).</strong> Ordering pattern is monthly/bi-weekly rolling orders.</li>
                        <li><strong>China (CN):</strong> <strong>Generally Disabled.</strong> Regional behavior is inventory replenishment. <em>Rule: Class C only</em> (Class A/B disabled).</li>
                    </ul>
                `
            },
            { 
                id: 7, 
                title: "NPI", 
                editUrl: "https://docs.google.com/document/d/1NmUAM8uwIgWhnU9eaUl1npf26h8GMMe5bv79pdVV_xA/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/bdba74dc-e553-420d-a4a3-46ae280101ab/edit?viewport_loc=64%2C-93%2C6115%2C2808%2C1eaPQgkh9kd2u&invitationId=inv_8b51bacc-dcd3-493d-bcd6-ac7675d4a852", 
                imgSrc: "NPI@.drawio (2).png", 
                htmlContent: `
                    <h3>🎯 Purpose</h3>
                    <p>This process outlines the overall workflow for New Product Introduction (NPI), specifically defining when the Demand Planning department should engage, which discussions they need to participate in, and the system configurations and forecast upload tasks they must complete.</p>
                    <h3>📘 Definition</h3>
                    <p>The specific workflow relevant to DP is defined as the <strong>complete cycle spanning from SKU enablement, pre-release, bottom-up forecast engagement, and forecast upload, all the way through to post-Gate 2 change control</strong>.</p>
                    <h3>💡 Importance & Pain Points Resolved</h3>
                    <ul>
                        <li><strong>Early Preparation Activation:</strong> The new process integrates DP into the discussions as soon as Commercial / CCM begins establishing the forecast. Instead of waiting idly for final approvals, DP can now complete SKU enablement, data preparation, and assumption alignment ahead of time.</li>
                        <li><strong>Enhancing Forecast Credibility:</strong> By providing historical data, look-alike product data, and phase-in/phase-out information, DP can help verify whether the Initial Loading Quantity (ILQ) is sufficient.</li>
                    </ul>
                    <h3>⚙️ Core Planning Logic</h3>
                    <h4>1. Forecast Loading Granularity Level</h4>
                    <ul>
                        <li><strong>NAM (North America):</strong> Loaded by specific key customer (e.g., Walmart, Best Buy).</li>
                        <li><strong>Europe:</strong> Loaded by forecast stream (e.g., Amazon, CD, Europe Others).</li>
                        <li><strong>AP / GCN / LATAM:</strong> Typically loaded by country level.</li>
                    </ul>
                    <h4>2. Timeline & Offset Logic (OSD / DCS / Sell-in Offset)</h4>
                    <ul>
                        <li><strong>OSD (On-Shelf Date):</strong> The actual product launch date in store or online.</li>
                        <li><strong>DCS Window:</strong> Typically set around <strong>two weeks prior to OSD</strong>.</li>
                    </ul>
                    <h4>3. Statistical Forecast vs. Manual Override Rules</h4>
                    <p>During the initial NPI phase, <strong>Manual Overrides must be used</strong> due to a lack of historical baseline data. After approximately 3 to 6 months post-launch, evaluate transitioning control to the system by gradually removing the overrides.</p>
                `
            },
            { 
                id: 8, 
                title: "PIPO", 
                editUrl: "https://docs.google.com/document/d/1_g24nECB_6t0iS1bmEhtFJKBhCyRn0bHWpiC4Urh410/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/eda2e3e8-20b5-4a9b-ad07-0baeff29bb1c/edit?viewport_loc=187%2C187%2C2972%2C1365%2C7oy5SD2QaNaMp&invitationId=inv_7c076807-f33c-4810-97da-e4f441c5b593", 
                imgSrc: "PIPO@.drawio (3).png", 
                htmlContent: `
                    <h3>🎯 Purpose</h3>
                    <ul>
                        <li><strong>Portfolio Optimization & Rigorous Supply Control:</strong> Define clear phase-in/out strategies per product line/SKU and lock LTB quantities in the system to prevent any production overrun beyond the authorized cap.</li>
                    </ul>
                    <h3>📘 Definition & Key Terms</h3>
                    <ul>
                        <li><strong>PIPO (Phase-In Phase-Out):</strong> This is the process of defining and driving which product lines or SKUs should be phased out of the portfolio and which should be phased in. This global strategy is defined and spearheaded by the BG/GCO unit.</li>
                        <li><strong>LTB (Last Time Buy):</strong> The final production or purchase order issued by the global planning department to the manufacturing side. Once confirmed, the total product supply is capped and locked.</li>
                    </ul>
                    <h3>⚙️ Core Planning Logic</h3>
                    <ul>
                        <li><strong>Strategic Definition & Alignment:</strong> Once the headquarters (BG/GCO) determines the entry and exit strategies and execution methods (Hard/Soft) for specific SKUs, DP must act as the gatekeeper to verify that the LTB demands submitted by the regions are fully aligned with this global portfolio strategy.</li>
                        <li><strong>Fixed Supply & Exception Management:</strong> Once the phase-out strategy is activated and the LTB quantity is confirmed, the system logic must <strong>"turn off forecast consumption."</strong></li>
                    </ul>
                `
            },
            { 
                id: 9, 
                title: "Event Handling", 
                editUrl: "https://docs.google.com/document/d/1XyJhZ6-BH1EDDYUfQx_ffmU_ymdI1KOCJ0NZIAFzcwM/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/b7653921-ee34-48b8-95ee-f9d74290562c/edit?viewport_loc=216%2C-509%2C6494%2C2982%2CWNXwqeS0xBqxg&invitationId=inv_8ec9dbbe-40be-466d-ae0d-ab541169c133", 
                imgSrc: "Event Handling@.drawio (1).png", 
                htmlContent: `
                    <h3>🎯 Purpose</h3>
                    <p>To address the inconsistencies in how regional planners manage events and to enhance cross-functional visibility, we are establishing a standardized global process.</p>
                    <h3>📘 Definition</h3>
                    <p>The term <strong>'Events'</strong> refers not only to standard marketing and promotional activities (such as Prime Day and Black Friday) but also encompasses all critical process milestones affecting the demand planning horizon, including Demand Reviews, Forecast Reviews, and Regional S&OP meetings.</p>
                    <h3>⚙️ Core Event Logic</h3>
                    <ul>
                        <li><strong>Always Incremental (Additive):</strong> Event demand is treated as strictly additive (<em>Final Forecast = Baseline + Event Qty</em>). If the baseline already mathematically includes the promotional event, planners must manually deduct that volume from the baseline to avoid double counting.</li>
                        <li><strong>Link & Offset Lead Time:</strong> CSC or KAM must provide the exact lead time offset from Event DCS to Sell-in. The Maestro system then automatically projects the Sell-in Forecast based on this offset.</li>
                        <li><strong>Strict 1:1 Ratio:</strong> Maintain an exact 1:1 link between Event DCS and Sell-in; no additional safety stocks or tactical inventory buffers should ever be layered on top of confirmed events.</li>
                    </ul>
                `
            },
            { id: 10, title: "Account Level Planning", editUrl: "", lucidUrl: "", imgSrc: "", htmlContent: "" },

                imgSrc: "DTX @.drawio (1).png", 
                htmlContent: `
                    <h3>🎯 Purpose</h3>
                    <p>To establish a clear workflow for accessory roadmap creation, simplified commercial approval, lifecycle alignment, and forecast updates.</p>
                    <h3>⚙️ Ownership & Portfolio Setup</h3>
                    <ul>
                        <li><strong>Owner Initiative:</strong> The DTX Global Team is the official owner to initiate the right accessories required to drive DTX sales.</li>
                        <li><strong>BG Sponsorship Requirements:</strong> They secure explicit BG sponsorship with sign-off to add it into portfolio and assigned LPM to help create SKU.</li>

                    <h3>💰 Finance Alignment & Business Case</h3>

                        <li><strong>Streamlined Approval:</strong> Finance has agreed to simplify the standard business case approval process by using a **one-pager template in email** instead of full BCF.</li>
                        <li><strong>Approver Realignment:</strong> The **Channel Finance Lead** will act as the final approver instead of BG Finance.</li>
                    </ul>
                    <h3>📌 ASP Guideline</h3>
                    <ul>
                        <li><strong>Plan Selection Rule:</strong> In the vast majority of cases, accessories are ultimately sold to the market at the **Discounted ASP**. Therefore, the **Discounted ASP must be used in our Demand Plan**.</li>

                `

        const container = document.getElementById('gridContainer');

        const textContentArea = document.getElementById('textContentArea');
        const processImg = document.getElementById('processImg');
        const imgOuterWrapper = document.getElementById('imageOuterWrapper');
        
        let zoomScale = 1;
        let currentActiveEditUrl = ""; 
        let currentActiveLucidUrl = ""; 

        stepsData.forEach(step => {
            const card = document.createElement('div');
            
            if (step.imgSrc && step.imgSrc.trim() !== "") {
                card.className = 'process-card has-image'; 
            } else {
                card.className = 'process-card no-image';  
            }
            
            card.innerHTML = `<div class="step-title">${step.title}</div>`;
            card.addEventListener('click', () => openModal(step));
            container.appendChild(card);
        });

        function openModal(step) {
            modalTitle.innerText = step.title;
            currentActiveEditUrl = step.editUrl; 
            currentActiveLucidUrl = step.lucidUrl; 

            // 混合邏輯：如果該步驟有設定 contentFile，就去 GitHub 抓取檔案
            if (step.contentFile && step.contentFile.trim() !== "") {
                textContentArea.innerHTML = "<p style='color:#666;'>⏳ Loading process details from GitHub...</p>";
                textContentArea.style.display = 'block';

                // 將檔名進行網址安全編碼 (例如將空格轉為 %20)
                const safeFileName = encodeURIComponent(step.contentFile);
                const targetUrl = githubRawBaseUrl + safeFileName;
                
                fetch(targetUrl)
                    .then(response => {
                        if (!response.ok) throw new Error("GitHub file not found");
                        return response.text();
                    })
                    .then(htmlData => {
                        textContentArea.innerHTML = htmlData.trim() !== "" ? htmlData : "<p style='color:#999;'>No content details found in file.</p>";
                    })
                    .catch(error => {
                        console.error(error);
                        textContentArea.innerHTML = `<p style='color:#cc0000;'>❌ Failed to load content from GitHub.<br><small>Please verify that the file <strong>contents/ASP Management words.html</strong> exists in your repo.</small></p>`;
                    });

            // 否則就讀取原本舊有的內嵌 htmlContent
            } else if (step.htmlContent && step.htmlContent.trim() !== "") {
                textContentArea.innerHTML = step.htmlContent;
                textContentArea.style.display = 'block';
            } else {
                textContentArea.innerHTML = "<p style='color:#999;'>No content details provided yet.</p>";
                textContentArea.style.display = 'block';
            }

            if (step.editUrl && step.editUrl.trim() !== "") {
                document.getElementById('editDocBtn').style.display = 'inline-block';
            } else {
                document.getElementById('editDocBtn').style.display = 'none';
            }

            if (step.lucidUrl && step.lucidUrl.trim() !== "") {
                document.getElementById('lucidLinkBtn').style.display = 'inline-block';
            } else {
                document.getElementById('lucidLinkBtn').style.display = 'none';
            }

            if (step.imgSrc && step.imgSrc.trim() !== "") {
                processImg.src = step.imgSrc;
                imgOuterWrapper.style.display = 'flex';
            } else {
                imgOuterWrapper.style.display = 'none'; 
            }

            loadGithubDiscussions(step.title);
            resetZoom(); 
            overlay.classList.add('active');
            document.querySelector('.modal-body').scrollTop = 0; 
        }

            if (currentActiveEditUrl && currentActiveEditUrl.trim() !== "") {

            }
        }

                window.open(currentActiveLucidUrl, '_blank');
            } else {
                alert("No Lucidchart link assigned to this process diagram.");
            }
        }

        function adjustZoom(amount) {
            zoomScale += amount;
            if (zoomScale < 0.5) zoomScale = 0.5;  
            if (zoomScale > 3.0) zoomScale = 3.0;  
            processImg.style.transform = `scale(${zoomScale})`;
            processImg.style.width = (zoomScale > 1) ? 'auto' : '100%';
        }

        function resetZoom() {
            zoomScale = 1;
            processImg.style.transform = `scale(${zoomScale})`;
            processImg.style.width = '100%';
        }

        closeBtn.addEventListener('click', () => overlay.classList.remove('active'));
        overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.classList.remove('active'); });

        }
