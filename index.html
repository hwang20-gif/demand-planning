<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demand Planning Global Process Standardization</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --primary-green: #2E7D32;   
            --accent-green: #00C853;    
            --bg-warm-white: #FAF9F6;   
            --pure-white: #FFFFFF;      
            --card-has-img: #E0E4E0;    /* Grey for cards WITH process maps */
            --text-dark-green: #1B5E20; 
            --border-soft: #E0E4E0;     
            --lucid-blue: #2979FF; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-warm-white);
            color: var(--primary-green);
            padding: 40px 20px 60px 20px; 
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-maintenance-container {
            margin-bottom: 25px;
        }

        .maintenance-btn {
            background-color: transparent;
            color: #757575;
            border: 1px solid #CCCCCC;
            border-radius: 20px;
            padding: 6px 18px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .maintenance-btn:hover {
            background-color: #EEEEEE;
            color: #424242;
            border-color: #9E9E9E;
        }

        header h1 {
            color: var(--primary-green);
            font-size: 2.4rem;
            letter-spacing: 1.5px;
            font-weight: 700;
            line-height: 1.4;
            text-transform: uppercase;
        }

        .header-btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap; 
        }

        .ai-chat-trigger, .ops-guide-btn, .dp-folder-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            border-radius: 30px;
            padding: 12px 28px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            min-width: 160px; 
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .ai-chat-trigger {
            background-color: var(--primary-green);
            color: white;
            box-shadow: 0 4px 14px rgba(46, 125, 50, 0.2);
        }
        
        .ai-chat-trigger:hover { 
            transform: translateY(-2px); 
            background-color: #1B5E20;
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.3);
        }

        .ops-guide-btn {
            background-color: var(--pure-white);
            color: var(--primary-green);
            border: 2px solid var(--primary-green);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.03);
        }

        .ops-guide-btn:hover {
            transform: translateY(-2px);
            background-color: #E8F5E9;
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.1);
        }

        .dp-folder-btn {
            background-color: var(--pure-white);
            color: var(--primary-green);
            border: 2px solid var(--primary-green);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.03);
        }

        .dp-folder-btn:hover {
            transform: translateY(-2px);
            background-color: #E8F5E9;
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.1);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .process-card {
            border: 2px solid var(--border-soft);
            border-radius: 14px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.03);
            min-height: 140px;
        }

        .process-card.no-image {
            background-color: var(--pure-white);
        }

        .process-card.has-image {
            background-color: var(--card-has-img);
        }

        .process-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-green);
            box-shadow: 0 12px 24px rgba(46, 125, 50, 0.08);
            background-color: #F4FAF4; 
        }

        .process-card .step-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--primary-green);
            line-height: 1.4;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(27, 94, 32, 0.4); 
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--pure-white);
            border: 1px solid var(--border-soft);
            width: 92%;
            max-width: 1000px; 
            height: 85vh;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 24px 50px rgba(0,0,0,0.15);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 24px 35px;
            border-bottom: 1px solid var(--border-soft);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #F7F9F7;
        }

        .modal-header h2 {
            color: var(--primary-green);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2.2rem;
            cursor: pointer;
            color: #A0A5A0;
            transition: color 0.2s;
            line-height: 1;
        }

        .close-btn:hover {
            color: var(--accent-green);
        }

        .modal-body {
            padding: 35px;
            overflow-y: auto; 
            flex: 1;
            display: flex;
            flex-direction: column; 
            gap: 30px; 
        }

        /* 💡 格式大統一：文字外殼方框，改為與流程圖外殼完全相同的灰底與邊距 */
        .text-container-wrapper {
            background: #FAFAFA;
            border-radius: 12px;
            border: 1px solid var(--border-soft);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 💡 格式大統一：文字導覽列，背景與邊界線與流程圖的 zoom-bar 完美統一 */
        .text-header-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            background: var(--pure-white);
            padding: 8px 15px;
            border-radius: 6px;
            border: 1px solid var(--border-soft);
        }

        .text-content-area {
            color: #333333;
            line-height: 1.6;
            font-size: 1.05rem;
            background: #FFFFFF;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #EEEEEE;
        }

        .text-content-area h3 {
            color: var(--primary-green);
            margin: 25px 0 10px 0;
            font-size: 1.3rem;
            border-bottom: 1px solid #E8EBE8;
            padding-bottom: 5px;
        }

        .text-content-area h4 {
            color: var(--text-dark-green);
            margin: 15px 0 8px 0;
            font-size: 1.15rem;
            font-weight: 600;
            margin-top: 20px;
        }

        .text-content-area h3:first-child {
            margin-top: 0;
        }

        .text-content-area p {
            margin-bottom: 12px;
        }

        .text-content-area ul {
            margin-left: 25px;
            margin-bottom: 15px;
        }

        .text-content-area li {
            margin-bottom: 6px;
        }

        /* Google Doc 專用內嵌框架樣式 */
        .gdoc-iframe {
            width: 100%;
            height: 500px;
            border: 1px solid #EEEEEE;
            border-radius: 6px;
            background-color: #FFFFFF;
        }

        /* 💡 格式大統一：全域 Edit 按鈕樣式與尺寸大小完全一模一樣 */
        .uniform-edit-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: var(--primary-green) !important; 
            color: white !important; 
            border: none !important;
            border-radius: 6px;
            padding: 8px 18px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(46, 125, 50, 0.15) !important;
            transition: all 0.2s ease;
        }
        
        .uniform-edit-btn:hover {
            background-color: #1B5E20 !important; 
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.25) !important;
        }

        /* 💡 格式大統一：流程圖外殼方框，背景色與內距與文字外殼完全一致 */
        .image-outer-wrapper {
            background: #FAFAFA;
            border-radius: 12px;
            border: 1px solid var(--border-soft);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .zoom-bar {
            display: flex;
            justify-content: flex-end; 
            align-items: center;
            background: var(--pure-white);
            padding: 8px 15px;
            border-radius: 6px;
            border: 1px solid var(--border-soft);
        }

        .image-scroll-box {
            overflow-y: visible;    
            overflow-x: auto;       
            background: #FFFFFF;
            border: 1px solid #EEEEEE;
            border-radius: 6px;
            padding: 10px;
            position: relative;
        }

        .process-image {
            width: 100%;            
            height: auto;
            display: block;
            margin: 0 auto;
            transition: transform 0.2s ease; 
            transform-origin: top center;    
        }

        .discussion-box {
            margin-top: 20px;
            padding-top: 25px;
            border-top: 2px solid var(--border-soft);
        }
        .discussion-box h3 {
            font-size: 1.3rem;
            color: var(--primary-green);
            margin-bottom: 20px;
        }
    </style>
</head>

        let currentActiveLucidUrl = ""; 

        stepsData.forEach(step => {
            const card = document.createElement('div');
            
            if (step.imgSrc && step.imgSrc.trim() !== "") {
                card.className = 'process-card has-image'; 
            } else {
                card.className = 'process-card no-image';  
            }
            
            card.innerHTML = `<div class="step-title">${step.title}</div>`;
            card.addEventListener('click', () => openModal(step));
            container.appendChild(card);
        });

        function openModal(step) {
            modalTitle.innerText = step.title;
            currentActiveEditUrl = step.editUrl; 
            currentActiveLucidUrl = step.lucidUrl; 

            // 💡 若該節點完全沒有 SOP 文字資料與編輯網址，則將文字方框隱藏，以保持對稱
            if ((!step.contentFile || step.contentFile.trim() === "") && (!step.editUrl || step.editUrl.trim() === "")) {
                textContainerWrapper.style.display = 'none';
            } else {
                textContainerWrapper.style.display = 'flex';
            }

            // 💡 只有當節點設定有編輯連結（editUrl）時，才顯示文字區塊右上角的 Edit 按鈕
            if (step.editUrl && step.editUrl.trim() !== "") {
                textHeaderBar.style.display = 'flex';
            } else {
                textHeaderBar.style.display = 'none';
            }

            if (step.contentFile && step.contentFile.trim() !== "") {
                textContentArea.style.display = 'block';

                if (step.contentFile === "GOOGLE_DOC") {
                    textContentArea.innerHTML = `
                        <iframe src="${googleDocPublishedUrl}" class="gdoc-iframe" loading="lazy"></iframe>
                    `;
                } else {
                    textContentArea.innerHTML = "<p style='color:#666;'>⏳ Loading process details from GitHub...</p>";
                    const safeFileName = encodeURIComponent(step.contentFile);
                    const targetUrl = githubRawBaseUrl + safeFileName;

                    fetch(targetUrl)
                        .then(response => {
                            if (!response.ok) throw new Error("GitHub file not found");
                            return response.text();
                        })
                        .then(markdownData => {
                            textContentArea.innerHTML = marked.parse(markdownData);
                        })
                        .catch(error => {
                            console.error(error);
                            textContentArea.innerHTML = `<p style='color:#cc0000;'>❌ Failed to load content from GitHub.<br><small>Please verify that the file <strong>${step.contentFile}</strong> exists in your repository root.</small></p>`;
                        });
                }

            } else {
                textContentArea.innerHTML = "<p style='color:#999;'>No content details provided yet.</p>";
                textContentArea.style.display = 'block';
            }

            if (step.imgSrc && step.imgSrc.trim() !== "") {
                processImg.src = step.imgSrc;
                imgOuterWrapper.style.display = 'flex';
            } else {
                imgOuterWrapper.style.display = 'none'; 
            }

            loadGithubDiscussions(step.title);
            resetZoom(); 
            overlay.classList.add('active');
            document.querySelector('.modal-body').scrollTop = 0; 
        }

        function openGoogleDocEditor() {
            if (currentActiveEditUrl && currentActiveEditUrl.trim() !== "") {
                window.open(currentActiveEditUrl, '_blank');
            } else {
                alert("No editor link assigned to this process.");
            }
        }

        function openLucidchartLink() {
            if (currentActiveLucidUrl && currentActiveLucidUrl.trim() !== "") {
                window.open(currentActiveLucidUrl, '_blank');
            } else {
                alert("No Lucidchart link assigned to this process diagram.");
            }
        }

        function openOpsGuide() { window.open('https://docs.google.com/presentation/d/1cbAnvojSkH5teuSn1MF7fbXorp2Lx4_uwiNqKWgAp5k/edit?usp=sharing', '_blank'); }
        function toggleAIChat() { window.open('https://logiq.logitech.io/share/assistant/b32d00bf-a51d-45c2-a730-93dbd3946054', '_blank'); }
        function openDpFolder() { window.open('https://docs.google.com/spreadsheets/d/1rvUhIqK7iLisidxdY26Dl7LKgrN1RcgLAObDiteX-Kw/edit?usp=sharing', '_blank'); }
        function openMaintenanceGuide() { window.open('https://docs.google.com/presentation/d/1lnbt6oyuPopsrd-RrgA-hKkFz_MrDgvenTAOk7rxets/edit?usp=sharing', '_blank'); }

        function adjustZoom(amount) {
            zoomScale += amount;
            if (zoomScale < 0.5) zoomScale = 0.5;  
            if (zoomScale > 3.0) zoomScale = 3.0;  
            processImg.style.transform = `scale(${zoomScale})`;
            processImg.style.width = (zoomScale > 1) ? 'auto' : '100%';
        }

        function resetZoom() {
            zoomScale = 1;
            processImg.style.transform = `scale(${zoomScale})`;
            processImg.style.width = '100%';
        }

        closeBtn.addEventListener('click', () => overlay.classList.remove('active'));
        overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.classList.remove('active'); });

        function loadGithubDiscussions(processTitle) {
            const container = document.getElementById('giscusContainer');
            container.innerHTML = ''; 

            const script = document.createElement('script');
            script.src = "https://giscus.app/client.js";
            
            script.setAttribute("data-repo", "wlee5-design/demand-planning"); 
            script.setAttribute("data-repo-id", "R_kgDOS99Z8A");
            script.setAttribute("data-category", "Q&A");
            script.setAttribute("data-category-id", "DIC_kwDOS99Z8M4C_h01");
            
            script.setAttribute("data-mapping", "specific");
            script.setAttribute("data-term", processTitle);
            
            script.setAttribute("data-strict", "1");
            script.setAttribute("data-reactions-enabled", "1");
            script.setAttribute("data-emit-metadata", "0");
            script.setAttribute("data-input-position", "bottom");
            script.setAttribute("data-theme", "light");
            script.setAttribute("data-lang", "en");
            script.crossOrigin = "anonymous";
            script.async = true;

            container.appendChild(script);
        }
    </script>
</body>
</html>
