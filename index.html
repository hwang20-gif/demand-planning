<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demand Planning Global Process Standardization</title>

    <style>
        :root {
            --primary-green: #2E7D32;   
            --accent-green: #00C853;    
            --bg-warm-white: #FAF9F6;   
            --pure-white: #FFFFFF;      
            --text-dark-green: #1B5E20; 
            --border-soft: #E0E4E0;     
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-warm-white);
            color: var(--primary-green);
            padding: 60px 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            color: var(--primary-green);
            font-size: 2.4rem;
            letter-spacing: 1.5px;
            font-weight: 700;
            line-height: 1.4;
            text-transform: uppercase;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .process-card {
            background-color: var(--pure-white);
            border: 2px solid var(--border-soft);
            border-radius: 14px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.03);
            min-height: 140px;
        }

        .process-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-green);
            box-shadow: 0 12px 24px rgba(46, 125, 50, 0.08);
            background-color: #F4FAF4; 
        }

        .process-card .step-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--primary-green);
            line-height: 1.4;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(27, 94, 32, 0.4); 
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--pure-white);
            border: 1px solid var(--border-soft);
            width: 92%;
            max-width: 1000px; 
            height: 85vh;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 24px 50px rgba(0,0,0,0.15);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 24px 35px;
            border-bottom: 1px solid var(--border-soft);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #F7F9F7;
        }

        .modal-header h2 {
            color: var(--primary-green);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2.2rem;
            cursor: pointer;
            color: #A0A5A0;
            transition: color 0.2s;
            line-height: 1;
        }

        .close-btn:hover {
            color: var(--accent-green);
        }

        .modal-body {
            padding: 35px;
            overflow-y: auto; 
            flex: 1;
            display: flex;
            flex-direction: column; 
            gap: 30px; 
        }

        /* 📝 頂部多功能工具列 */
        .modal-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #FAFAFA;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-soft);
        }

        .toolbar-group {
            display: flex;
            gap: 10px;
        }

        /* 📄 Google Docs 內嵌網頁展示區容器 */
        .docs-iframe-container {
            width: 100%;
            height: 520px; 
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            background: #FFFFFF;
            overflow: hidden;
        }

        .docs-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .image-outer-wrapper {
            background: #FAFAFA;
            border-radius: 12px;
            border: 1px solid var(--border-soft);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        .zoom-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            background: var(--pure-white);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border-soft);
        }
