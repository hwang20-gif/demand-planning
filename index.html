<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demand Planning Global Process Standardization</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --primary-green: #2E7D32;   
            --accent-green: #00C853;    
            --bg-warm-white: #FAF9F6;   
            --pure-white: #FFFFFF;      
            --card-has-img: #E0E4E0;    
            --text-dark-green: #1B5E20; 
            --border-soft: #E0E4E0;     
            --lucid-blue: #2979FF; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-warm-white);
            color: var(--primary-green);
            padding: 40px 20px 60px 20px; 
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-maintenance-container {
            margin-bottom: 25px;
        }

        .maintenance-btn {
            background-color: transparent;
            color: #757575;
            border: 1px solid #CCCCCC;
            border-radius: 20px;
            padding: 6px 18px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .maintenance-btn:hover {
            background-color: #EEEEEE;
            color: #424242;
            border-color: #9E9E9E;
        }

        header h1 {
            color: var(--primary-green);
            font-size: 2.4rem;
            letter-spacing: 1.5px;
            font-weight: 700;
            line-height: 1.4;
            text-transform: uppercase;
        }

        /* 最外層（首頁）按鈕維持乾淨的高級白底風格 */
        .header-btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap; 
        }

        .ai-chat-trigger, .ops-guide-btn, .dp-folder-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            border-radius: 30px;
            padding: 12px 28px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            min-width: 160px; 
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .ai-chat-trigger {
            background-color: var(--primary-green);
            color: white;
            box-shadow: 0 4px 14px rgba(46, 125, 50, 0.2);
        }
        
        .ai-chat-trigger:hover { 
            transform: translateY(-2px); 
            background-color: #1B5E20;
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.3);
        }

        .ops-guide-btn, .dp-folder-btn {
            background-color: var(--pure-white);
            color: var(--primary-green);
            border: 2px solid var(--primary-green);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.03);
        }

        .ops-guide-btn:hover, .dp-folder-btn:hover {
            transform: translateY(-2px);
            background-color: #E8F5E9;
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.1);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 最外層的所有卡片統一維持純白底色 */
        .process-card {
            border: 2px solid var(--border-soft);
            border-radius: 14px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.03);
            min-height: 140px;
            background-color: var(--pure-white) !important; 
        }

        .process-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-green);
            box-shadow: 0 12px 24px rgba(46, 125, 50, 0.08);
            background-color: #F4FAF4 !important; 
        }

        .process-card .step-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--primary-green);
            line-height: 1.4;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(27, 94, 32, 0.4); 
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--pure-white);
            border: 1px solid var(--border-soft);
            width: 92%;
            max-width: 1000px; 
            height: 85vh;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 24px 50px rgba(0,0,0,0.15);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* 標頭導覽列結構 */
        .modal-header {
            padding: 24px 35px;
            border-bottom: 1px solid var(--border-soft);
            display: flex;
            justify-content: space-between; 
            align-items: center;
            background-color: #F7F9F7;
        }

        .modal-header h2 {
            color: var(--primary-green);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2.2rem;
            cursor: pointer;
            color: #A0A5A0;
            transition: color 0.2s;
            line-height: 1;
        }

        .close-btn:hover {
            color: var(--accent-green);
        }

        .modal-body {
            padding: 35px;
            overflow-y: auto; 
            flex: 1;
            display: flex;
            flex-direction: column; 
            gap: 30px; 
        }

        /* 格式大對稱：內部方框維持高級灰底排版 */
        .text-container-wrapper, .image-outer-wrapper {
            background: #FAFAFA;
            border-radius: 12px;
            border: 1px solid var(--border-soft);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 控制按鈕導覽列 */
        .text-header-bar, .zoom-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            background: var(--pure-white);
            padding: 8px 15px;
            border-radius: 6px;
            border: 1px solid var(--border-soft);
        }

        .text-content-area {
            color: #333333;
            line-height: 1.6;
            font-size: 1.05rem;
            background: #FFFFFF;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #EEEEEE;
        }

        /* Google Doc 內嵌框架樣式 */
        .gdoc-iframe {
            width: 100%;
            height: 500px;
            border: 1px solid #EEEEEE;
            border-radius: 6px;
            background-color: #FFFFFF;
        }

        /* 格式大對稱：全域 Edit 按鈕基礎樣式 */
        .uniform-edit-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white !important; 
            border: none !important;
            border-radius: 6px;
            padding: 8px 18px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* 🟢 標準已定案流程：經典羅技綠 */
        .uniform-edit-btn.status-finalized {
            background-color: var(--primary-green) !important;
            box-shadow: 0 2px 6px rgba(46, 125, 50, 0.15) !important;
        }
        .uniform-edit-btn.status-finalized:hover {
            background-color: #1B5E20 !important; 
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.25) !important;
        }

        /* 🔴 11~18 待討論流程：工業灰底色 */
        .uniform-edit-btn.status-discussing {
            background-color: #9E9E9E !important;
            box-shadow: 0 2px 6px rgba(158, 158, 158, 0.15) !important;
        }
        .uniform-edit-btn.status-discussing:hover {
            background-color: #757575 !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(158, 158, 158, 0.25) !important;
        }

        .image-scroll-box {
            overflow-y: visible;    
            overflow-x: auto;       
            background: #FFFFFF;
            border: 1px solid #EEEEEE;
            border-radius: 6px;
            padding: 10px;
            position: relative;
        }

        .process-image {
            width: 100%;            
            height: auto;
            display: block;
            margin: 0 auto;
            transition: transform 0.2s ease; 
            transform-origin: top center;    
        }

        .discussion-box {
            margin-top: 20px;
            padding-top: 25px;
            border-top: 2px solid var(--border-soft);
        }
        .discussion-box h3 {
            font-size: 1.3rem;
            color: var(--primary-green);
            margin-bottom: 20px;
        }
    </style>
</head>

        const textEditBtn = document.getElementById('textEditBtn');
        const lucidLinkBtn = document.getElementById('lucidLinkBtn');
        
        let zoomScale = 1;
        let currentActiveEditUrl = ""; 
        let currentActiveLucidUrl = ""; 

        stepsData.forEach(step => {
            const card = document.createElement('div');
            card.className = 'process-card no-image';  
            card.innerHTML = `<div class="step-title">${step.title}</div>`;
            card.addEventListener('click', () => openModal(step));
            container.appendChild(card);
        });

        function openModal(step) {
            modalTitle.innerText = step.title;
            currentActiveEditUrl = step.editUrl; 
            currentActiveLucidUrl = step.lucidUrl; 

            // 💡 判斷是否為 11~18 的待討論流程，自動切換按鈕底色
            const isDiscussing = (step.id >= 11 && step.id <= 18);
            if (isDiscussing) {
                textEditBtn.className = "uniform-edit-btn status-discussing";
                lucidLinkBtn.className = "uniform-edit-btn status-discussing";
            } else {
                textEditBtn.className = "uniform-edit-btn status-finalized";
                lucidLinkBtn.className = "uniform-edit-btn status-finalized";
            }

            if (step.contentFile === "B2B_NO_TEXT" || ((!step.contentFile || step.contentFile.trim() === "") && (!step.editUrl || step.editUrl.trim() === ""))) {
                textContainerWrapper.style.display = 'none';
            } else {
                textContainerWrapper.style.display = 'flex';
            }

            if (step.editUrl && step.editUrl.trim() !== "" && step.contentFile !== "B2B_NO_TEXT") {
                textHeaderBar.style.display = 'flex';
            } else {
                textHeaderBar.style.display = 'none';
            }

            if (step.contentFile && step.contentFile.trim() !== "" && step.contentFile !== "B2B_NO_TEXT") {
                textContentArea.style.display = 'block';

                if (step.contentFile === "GOOGLE_DOC") {
                    if(!step.docId || step.docId.includes("填入")) {
                        textContentArea.innerHTML = `<p style='color:#fb8c00;'>⚠️ Document link not assigned or published yet.<br><small>Please populate the published Google Doc ID inside stepsData block.</small></p>`;
                    } else {
                        const dynamicUrl = googleDocBaseUrl + step.docId + "/pub?embedded=true";
                        textContentArea.innerHTML = `
                            <iframe src="${dynamicUrl}" class="gdoc-iframe" loading="lazy"></iframe>
                        `;
                    }
                }
            } else {
                textContentArea.innerHTML = "";
            }

            if (step.imgSrc && step.imgSrc.trim() !== "") {
                processImg.src = step.imgSrc;
                imgOuterWrapper.style.display = 'flex';
            } else {
                imgOuterWrapper.style.display = 'none'; 
            }

            loadGithubDiscussions(step.title);
            resetZoom(); 
            overlay.classList.add('active');
            document.querySelector('.modal-body').scrollTop = 0; 
        }

        function openGoogleDocEditor() {
            if (currentActiveEditUrl && currentActiveEditUrl.trim() !== "") {
                window.open(currentActiveEditUrl, '_blank');
            } else {
                alert("No editor link assigned to this process.");
            }
        }

        function openLucidchartLink() {
            if (currentActiveLucidUrl && currentActiveLucidUrl.trim() !== "") {
                window.open(currentActiveLucidUrl, '_blank');

        function adjustZoom(amount) {
            zoomScale += amount;
            if (zoomScale < 0.5) zoomScale = 0.5;  
            if (zoomScale > 3.0) zoomScale = 3.0;  
            processImg.style.transform = `scale(${zoomScale})`;
            processImg.style.width = (zoomScale > 1) ? 'auto' : '100%';
        }

        function resetZoom() {
            zoomScale = 1;
            processImg.style.transform = `scale(${zoomScale})`;
            processImg.style.width = '100%';
        }

        closeBtn.addEventListener('click', () => overlay.classList.remove('active'));
        overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.classList.remove('active'); });
