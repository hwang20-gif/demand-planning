<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demand Planning Global Process Standardization</title>

    <style>
        :root {
            --primary-green: #2E7D32;   
            --accent-green: #00C853;    
            --bg-warm-white: #FAF9F6;   
            --pure-white: #FFFFFF;      
            --text-dark-green: #1B5E20; 
            --border-soft: #E0E4E0;     
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-warm-white);
            color: var(--primary-green);
            padding: 60px 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            color: var(--primary-green);
            font-size: 2.4rem;
            letter-spacing: 1.5px;
            font-weight: 700;
            line-height: 1.4;
            text-transform: uppercase;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .process-card {
            background-color: var(--pure-white);
            border: 2px solid var(--border-soft);
            border-radius: 14px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.03);
            min-height: 140px;
        }

        .process-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-green);
            box-shadow: 0 12px 24px rgba(46, 125, 50, 0.08);
            background-color: #F4FAF4; 
        }

        .process-card .step-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--primary-green);
            line-height: 1.4;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(27, 94, 32, 0.4); 
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--pure-white);
            border: 1px solid var(--border-soft);
            width: 92%;
            max-width: 1000px; 
            height: 85vh;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 24px 50px rgba(0,0,0,0.15);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 24px 35px;
            border-bottom: 1px solid var(--border-soft);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #F7F9F7;
        }

        .modal-header h2 {
            color: var(--primary-green);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2.2rem;
            cursor: pointer;
            color: #A0A5A0;
            transition: color 0.2s;
            line-height: 1;
        }

        .close-btn:hover {
            color: var(--accent-green);
        }

        .modal-body {
            padding: 35px;
            overflow-y: auto; 
            flex: 1;
            display: flex;
            flex-direction: column; 
            gap: 30px; 
        }

        .process-text {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-dark-green);
        }
        
        .process-text h4 {
            color: var(--primary-green);
            margin: 25px 0 6px 0;
            font-size: 1.25rem;
            font-weight: 700;
            border-bottom: 1px dashed var(--border-soft);
            padding-bottom: 4px;
        }
        
        .process-text h4:first-child {
            margin-top: 0;
        }

        .process-text p {
            margin-bottom: 10px;
        }

        /* 📝 頂部工具列樣式 (包含縮放與編輯按鈕) */
        .modal-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #FAFAFA;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-soft);
        }

        .toolbar-group {
            display: flex;
            gap: 10px;
        }

        .image-outer-wrapper {
            background: #FAFAFA;
            border-radius: 12px;
            border: 1px solid var(--border-soft);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        .zoom-control-btn {
            background-color: transparent;
            color: var(--primary-green);
            border: 1px solid var(--primary-green);
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .zoom-control-btn:hover {
            background-color: var(--primary-green);
            color: var(--pure-white);
        }

        .image-scroll-box {
            overflow-y: visible;    
            overflow-x: auto;       
            background: #FFFFFF;
            border: 1px solid #EEEEEE;
            border-radius: 6px;
            padding: 10px;
            position: relative;
        }

        .process-image {
            width: 100%;            
            height: auto;
            display: block;
            margin: 0 auto;
            transition: transform 0.2s ease; 
            transform-origin: top center;    
        }

        /* 🤖 Logi Q 右下角浮動按鈕樣式 */
        .ai-chat-trigger {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(46,125,50,0.3);
            z-index: 2000;
            transition: transform 0.2s;
        }
        .ai-chat-trigger:hover { transform: scale(1.05); }

        .discussion-box {
            margin-top: 20px;
            padding-top: 25px;
            border-top: 2px solid var(--border-soft);
        }
        .discussion-box h3 {
            font-size: 1.3rem;
            color: var(--primary-green);
            margin-bottom: 20px;
        }

        /* ✏️ 網頁編輯輸入框外觀 */
        .edit-textarea {
            width: 100%;
            height: 350px;
            padding: 15px;
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.6;
            border: 2px solid var(--primary-green);
            border-radius: 8px;
            color: #333;
            outline: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Demand Planning Global Process Standardization</h1>
    </header>

    <div class="grid-container" id="gridContainer"></div>

    <button class="ai-chat-trigger" onclick="toggleAIChat()">🤖</button>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Process Name</h2>
                <button class="close-btn" id="closeBtn">&times;</button>
            </div>
            <div class="modal-body">
                
                <div class="modal-toolbar">
                    <div class="toolbar-group" id="imageZoomTools">
                        <button class="zoom-control-btn" onclick="adjustZoom(0.2)">Zoom In +</button>
                        <button class="zoom-control-btn" onclick="adjustZoom(-0.2)">Zoom Out -</button>
                        <button class="zoom-control-btn" onclick="resetZoom()">Reset View</button>
                    </div>
                    <div class="toolbar-group">
                        <button class="zoom-control-btn" id="editContentBtn" onclick="toggleEditContentMode()">✏️ Edit Content</button>
                        <button class="zoom-control-btn" id="saveContentBtn" style="display: none; background-color: var(--primary-green); color: white;" onclick="saveContentChanges()">💾 Save Changes</button>
                    </div>
                </div>

                <div class="process-text" id="modalText"></div>
                
                <div class="image-outer-wrapper" id="imageOuterWrapper">
                    <div class="image-scroll-box">
                        <img src="" alt="Process Map Diagram" class="process-image" id="processImg">
                    </div>
                </div>

                <div class="discussion-box">
                    <h3>💬 Process Q&A & Threaded Discussions</h3>
                    <div id="giscusContainer"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // 初始化：優先讀取先前在瀏覽器修改過的資料，若無則採用初始設定值
        let localStepsData = JSON.parse(localStorage.getItem('dp_sop_editable_data')) || [
            { id: 1, title: "ASP management", desc: `<h4>Purpose</h4><p>[Insert Purpose here...]</p><h4>Definition</h4><p>[Insert Definition here...]</p><h4>Importance</h4><p>[Insert Importance here...]</p><h4>Logic</h4><p>[Insert Logic here...]</p>`, imgSrc: "ASP management@.png" },
            { id: 2, title: "WOH management", desc: `<h4>Purpose</h4><p>To establish a standardized, cross-functional collaboration mechanism for defining, aligning, and executing Week on Hand (WOH) Targets across markets. This ensures full synchronization among Demand Planning (DP), Finance, and Customer Supply Chain (CSC), grounding Finance's Gross Revenue(GR) Plan and CSC's Order Fulfillment in a unified inventory target to maximize operational and financial efficiency. </p><h4>Definition</h4><p>WOH (Week on Hand): Inventory target measured in weeks, indicating how many weeks of future demand the current inventory level can sustain.<br>Supercluster: The highest level of regional segmentation within Logitech (e.g., APM, GCN, NAM, LAT, EURO).<br>Customer Group / Subgroup: Customer-based segmentation (e.g., specific key account categories, or specific countries/markets like Taiwan, Hong Kong, Japan).<br>Product Line(PL) / Product Group (PG): Product-based segmentation (e.g., Gaming, PWS, Canova).<br>ABC Classification: A framework that categorizes products into A, B, or C levels based on their strategic importance, typically driven by sales volume or value contribution.</p><h4>Importance</h4><p>Alignment of Financial and Operational Metrics: WOH targets directly influence Finance’s financial targets, inventory targets, and the GR Plan, as well as CSC’s replenishment and order execution. Failing to align upfront results in a disconnect between financial budgeting and actual supply chain operations.<br>Market-Tailored Flexibility: Because planning logic varies across global markets (e.g., North America focuses heavily on major retailers, while Asia-Pacific focuses on country-specific dynamics and strategic products), the WOH framework must support multi-dimensional configurations to prevent one-size-fits-all stockouts or inventory piles.</p><h4>Logic</h4><p>Multi-Dimensional Flexibility: WOH targets should be defined at the most appropriate granularity depending on business needs (ranging broadly from the Supercluster level down to a specific Customer like Best Buy or an individual SKU), rather than sequentially passing through every single level.<br>Market-Practice Driven:<br>NAM: Primarily driven by Customer Group level.<br>APM / GCN: Does not strictly enforce ABC classification; certain 'C items' may require a higher WOH target due to specific country or customer requirements to avoid stockouts.<br>Emerging Market: Retains ABC Classification as part of the core logic.<br>EURO: Tends to be managed at the Category / Product Line level.</p>`, imgSrc: "WOH Management @.png" },
            { id: 3, title: "Return Rate management", desc: `<h4>Purpose</h4><p>[Insert Purpose here...]</p><h4>Definition</h4><p>[Insert Definition here...]</p><h4>Importance</h4><p>[Insert Importance here...]</p><h4>Logic</h4><p>[Insert Logic here...]</p>`, imgSrc: "Return Rate management@.png" },
            { id: 4, title: "DCS/SI carryover", desc: `<h4>Purpose</h4><p>To ensure the Weekly Supply Plan aligns with the Quarterly Commercial Commitment by preventing unintentional loss of unfulfilled demand.</p><h4>Definition</h4><p>DCS Carryover is the process of reassigning unconsumed forecasts to future periods. It prevents forecast drop when shipments do not occur as planned in a specific week, ensuring that the total quarterly commitment remains intact.</p><h4>Importance</h4><p>System Disaggregation: Although we input forecasts on a quarterly or monthly basis, the system automatically disaggregates these numbers into weekly plans for supply planning.<br>Preventing Forecast Erosion: If actual shipments fall short of the weekly forecast and the system simply discards the unfulfilled portion, the total demand plan will continuously shrink.<br>Example:<br>Quarterly Commitment: $10M<br>Situation: Shipments in the early weeks are lower than the weekly forecast.<br>Risk: Without a Carryover mechanism, the total Demand Plan might drop to $7M, even though the Sales/Commercial teams are still committed to the original $10M target.</p><h4>Logic</h4><p>DCS Carryover is not an automatic process. It requires a strategic assessment based on the following two criteria:</p><h4>1. Nature of the Demand: Delay vs. Decline</h4><p>We must determine if the unconsumed forecast is a timing issue or a demand loss:</p><ul><li><strong>Case for Carryover (Delay):</strong> If the shortfall is caused by a temporary shift—such as a customer ordering late, supply constraints, or a delayed promotional event—the volume should be carried over.</li><li><strong>Case for Reduction (Decline):</strong> If the market demand is weakening or the product has lost its competitive edge, the forecast should be revised downward instead of being carried over.</li></ul><h4>2. Market Segmentation</h4><p>The logic for Carryover varies depending on the market type:</p><p><strong>● Mature Markets: NAM, Europe, ANZ, Japan</strong></p><p>Mature markets are primarily market-driven, meaning consumption patterns closely reflect actual end-user demand. Therefore, the default rule for these regions is: <em>No Carryover by Default</em>.</p><p>If a weekly forecast is 100 but actual shipment is only 50, it is highly probable that the true market demand was only 50. Carrying over the remaining volume without justification risks creating artificial demand and inventory buildup.</p><p><u>Exceptions (Criteria for Carryover):</u> Carryover is only permitted when there is clear evidence that the demand is delayed, not lost. Valid exceptions include:</p><ul><li>Large-scale Events: Significant spikes such as Prime Day or Black Friday.</li><li>Order Timing: Explicit customer delays in placing purchase orders (POs).</li><li>Supply Constraints: Production or allocation issues that prevented fulfillment.</li><li>Logistics/Shipment Delays: Goods are ready but delayed in transit.</li><li>Commercial Validation: Formal confirmation from Sales/Commercial teams that the specific demand will resurface within the quarter.</li></ul><p><strong>● Emerging Markets: APM, Greater China, Latin America, and other Emerging Markets</strong></p><p>These regions are often commitment-driven and operate under a push-based model. In these markets, the quarterly target (e.g. $10M) is a firm commercial promise. Even if shipments are slow in the early weeks, the volume is expected to be recovered through aggressive sales activities toward the end of the period. Therefore, the default logic for these regions is: <em>Carryover is Frequently Required</em>.</p><p>Demand in these markets is often backloaded, meaning it clusters at the end of the month or quarter. If a shortfall occurs early on, it does not necessarily indicate a drop in demand, but rather a delay in execution. To ensure the Quarterly Sizing remains intact, unconsumed forecasts are carried over to future weeks.</p><p><u>Common Scenarios for Carryover:</u></p><ul><li>Month-End / Quarter-End Push: Concentrated shipment efforts to meet financial targets.</li><li>Major Promotional Events: Large-scale campaigns such as the 618 Shopping Festival.</li><li>Phased Fulfillment: Slow starts that are compensated by accelerated shipments in later weeks.</li><li>Commercial Assurance: Formal confirmation that the Quarterly Commitment remains unchanged and achievable.</li></ul>`, imgSrc: "DCS SI Carryover@.png" },
            { id: 5, title: "Channel Correction", desc: `<h4>Purpose</h4><p>[Insert Purpose here...]</p><h4>Definition</h4><p>[Insert Definition here...]</p><h4>Importance</h4><p>[Insert Importance here...]</p><h4>Logic</h4><p>[Insert Logic here...]</p>`, imgSrc: "Channel Correction@.png" },
            { id: 6, title: "Backlog management", desc: `<h4>Purpose</h4><p>[Insert Purpose here...]</p><h4>Definition</h4><p>[Insert Definition here...]</p><h4>Importance</h4><p>[Insert Importance here...]</p><h4>Logic</h4><p>[Insert Logic here...]</p>`, imgSrc: "Backlog management@.png" },
            { id: 7, title: "NPI", desc: `<h4>Purpose</h4><p>[Insert Purpose here...]</p><h4>Definition</h4><p>[Insert Definition here...]</p><h4>Importance</h4><p>[Insert Importance here...]</p><h4>Logic</h4><p>[Insert Logic here...]</p>`, imgSrc: "NPI@.drawio (2).png" },
            { id: 8, title: "PIPO", desc: `<h4>Purpose</h4><p>[Insert Purpose here...]</p><h4>Definition</h4><p>[Insert Definition here...]</p><h4>Importance</h4><p>[Insert Importance here...]</p><h4>Logic</h4><p>[Insert Logic here...]</p>`, imgSrc: "PIPO@.drawio (3).png" },
            { id: 9, title: "Event Handling", desc: `<h4>Purpose</h4><p>[Insert Purpose here...]</p><h4>Definition</h4><p>[Insert Definition here...]</p><h4>Importance</h4><p>[Insert Importance here...]</p><h4>Logic</h4><p>[Insert Logic here...]</p>`, imgSrc: "Event Handling@.drawio (1).png" },
            { id: 10, title: "Account Level Planning", desc: `<h4>Purpose</h4><p>[Insert Purpose here...]</p><h4>Definition</h4><p>[Insert Definition here...]</p><h4>Importance</h4><p>[Insert Importance here...]</p><h4>Logic</h4><p>[Insert Logic here...]</p>`, imgSrc: "" },
            { id: 11, title: "Monthly Planning", desc: `<h4>Purpose</h4><p>[Insert Purpose here...]</p><h4>Definition</h4><p>[Insert Definition here...]</p><h4>Importance</h4><p>[Insert Importance here...]</p><h4>Logic</h4><p>[Insert Logic here...]</p>`, imgSrc: "" },
            { id: 12, title: "Strategy and assumptions documentation", desc: `<h4>Purpose</h4><p>[Insert Purpose here...]</p><h4>Definition</h4><p>[Insert Definition here...]</p><h4>Importance</h4><p>[Insert Importance here...]</p><h4>Logic</h4><p>[Insert Logic here...]</p>`, imgSrc: "" },
            { id: 13, title: "Demand Plan Frozen Window", desc: `<h4>Purpose</h4><p>[Insert Purpose here...]</p><h4>Definition</h4><p>[Insert Definition here...]</p><h4>Importance</h4><p>[Insert Importance here...]</p><h4>Logic</h4><p>[Insert Logic here...]</p>`, imgSrc: "" },
            { id: 14, title: "One Page market data analysis", desc: `<h4>Purpose</h4><p>[Insert Purpose here...]</p><h4>Definition</h4><p>[Insert Definition here...]</p><h4>Importance</h4><p>[Insert Importance here...]</p><h4>Logic</h4><p>[Insert Logic here...]</p>`, imgSrc: "" },
            { id: 15, title: "Forecast Accy deep dive", desc: `<h4>Purpose</h4><p>[Insert Purpose here...]</p><h4>Definition</h4><p>[Insert Definition here...]</p><h4>Importance</h4><p>[Insert Importance here...]</p><h4>Logic</h4><p>[Insert Logic here...]</p>`, imgSrc: "" },
            { id: 16, title: "Direct Shipment Process", desc: `<h4>Purpose</h4><p>[Insert Purpose here...]</p><h4>Definition</h4><p>[Insert Definition here...]</p><h4>Importance</h4><p>[Insert Importance here...]</p><h4>Logic</h4><p>[Insert Logic here...]</p>`, imgSrc: "" },
            { id: 17, title: "Plannable flag", desc: `<h4>Purpose</h4><p>[Insert Purpose here...]</p><h4>Definition</h4><p>[Insert Definition here...]</p><h4>Importance</h4><p>[Insert Importance here...]</p><h4>Logic</h4><p>[Insert Logic here...]</p>`, imgSrc: "" },
            { id: 18, title: "Forecast Consumption management", desc: `<h4>Purpose</h4><p>[Insert Purpose here...]</p><h4>Definition</h4><p>[Insert Definition here...]</p><h4>Importance</h4><p>[Insert Importance here...]</p><h4>Logic</h4><p>[Insert Logic here...]</p>`, imgSrc: "" },
            { id: 19, title: "DTX Accessory Planning", desc: `<h4>Purpose</h4><p>[Insert Purpose here...]</p><h4>Definition</h4><p>[Insert Definition here...]</p><h4>Importance</h4><p>[Insert Importance here...]</p><h4>Logic</h4><p>[Insert Logic here...]</p>`, imgSrc: "DTX @.drawio (1).png" },
            { id: 20, title: "Accessory Planning Criteria", desc: `<h4>Purpose</h4><p>[Insert Purpose here...]</p><h4>Definition</h4><p>[Insert Definition here...]</p><h4>Importance</h4><p>[Insert Importance here...]</p><h4>Logic</h4><p>[Insert Logic here...]</p>`, imgSrc: "" }
        ];

        const container = document.getElementById('gridContainer');
        const overlay = document.getElementById('modalOverlay');
        const closeBtn = document.getElementById('closeBtn');
        const modalTitle = document.getElementById('modalTitle');
        const modalText = document.getElementById('modalText');
        const processImg = document.getElementById('processImg');
        const imgOuterWrapper = document.getElementById('imageOuterWrapper');
        
        let zoomScale = 1;
        let currentActiveStepId = null;
        let isContentEditMode = false; // 追蹤是否處於網頁編輯狀態

        // 渲染主面板卡片
        localStepsData.forEach(step => {
            const card = document.createElement('div');
            card.className = 'process-card';
            card.innerHTML = `<div class="step-title">${step.title}</div>`;
            card.addEventListener('click', () => openModal(step));
            container.appendChild(card);
        });

        function openModal(step) {
            currentActiveStepId = step.id;
            modalTitle.innerText = step.title;
            modalText.innerHTML = step.desc;

            if (step.imgSrc && step.imgSrc.trim() !== "") {
                processImg.src = step.imgSrc;
                imgOuterWrapper.style.display = 'flex';
                document.getElementById('imageZoomTools').style.display = 'flex';
            } else {
                imgOuterWrapper.style.display = 'none'; 
                document.getElementById('imageZoomTools').style.display = 'none';
            }

            // 強制關閉先前的編輯模式狀態
            isContentEditMode = false;
            document.getElementById('editContentBtn').innerText = "✏️ Edit Content";
            document.getElementById('saveContentBtn').style.display = "none";

            // 載入該流程卡片專屬的 GitHub 執行緒問答
            loadGithubDiscussions(step.title);

            resetZoom(); 
            overlay.classList.add('active');
            document.querySelector('.modal-body').scrollTop = 0; 
        }

        /* ✏️ 網頁端直接編輯文字的核心邏輯 */
        function toggleEditContentMode() {
            const textContainer = document.getElementById('modalText');
            const targetStep = localStepsData.find(s => s.id === currentActiveStepId);

            if (!isContentEditMode) {
                // 切換為：可輸入的編輯區塊 (保留原本的 HTML 語法結構讓管理者微調)
                textContainer.innerHTML = `
                    <textarea id="contentTextArea" class="edit-textarea">${targetStep.desc}</textarea>
                `;
                document.getElementById('editContentBtn').innerText = "❌ Cancel";
                document.getElementById('saveContentBtn').style.display = "inline-block";
                isContentEditMode = true;
            } else {
                // 取消編輯：還原原本純顯示的 HTML 內容
                textContainer.innerHTML = targetStep.desc;
                document.getElementById('editContentBtn').innerText = "✏️ Edit Content";
                document.getElementById('saveContentBtn').style.display = "none";
                isContentEditMode = false;
            }
        }

        // 儲存修改內容
        function saveContentChanges() {
            const updatedText = document.getElementById('contentTextArea').value;
            const targetIndex = localStepsData.findIndex(s => s.id === currentActiveStepId);
            
            // 1. 同步更新記憶體資料
            localStepsData[targetIndex].desc = updatedText;
            
            // 2. 存入瀏覽器快取
            localStorage.setItem('dp_sop_editable_data', JSON.stringify(localStepsData));
            
            // 3. 恢復正常顯示模式
            isContentEditMode = false;
            document.getElementById('editContentBtn').innerText = "✏️ Edit Content";
            document.getElementById('saveContentBtn').style.display = "none";
            document.getElementById('modalText').innerHTML = updatedText;
            
            // 💡 提示：目前已成功在你的瀏覽器中完成變更！
            alert("Process text successfully updated on your browser!\n(To sync this changes permanently for global team and Logi Q AI agent, remember to paste the updated stepsData array back to your index.html in VS Code and push to GitHub!)");
        }

        function adjustZoom(amount) {
            zoomScale += amount;
            if (zoomScale < 0.5) zoomScale = 0.5;  
            if (zoomScale > 3.0) zoomScale = 3.0;  
            processImg.style.transform = `scale(${zoomScale})`;
            processImg.style.width = (zoomScale > 1) ? 'auto' : '100%';
        }

        function resetZoom() {
            zoomScale = 1;
