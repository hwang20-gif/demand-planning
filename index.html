<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demand Planning Global Process Standardization</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --primary-green: #2E7D32;   
            --accent-green: #00C853;    
            --bg-warm-white: #FAF9F6;   
            --pure-white: #FFFFFF;      
            --card-has-img: #E0E4E0;    /* Grey for cards WITH process maps */
            --text-dark-green: #1B5E20; 
            --border-soft: #E0E4E0;     
            --lucid-blue: #2979FF; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-warm-white);
            color: var(--primary-green);
            padding: 60px 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            color: var(--primary-green);
            font-size: 2.4rem;
            letter-spacing: 1.5px;
            font-weight: 700;
            line-height: 1.4;
            text-transform: uppercase;
        }

        /* 按鈕容器：讓 OPS Guide 與 AI 助理並排 */
        .header-btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        /* 📊 OPS Guide 按鈕與 AI 助理的共同基礎樣式 */
        .ai-chat-trigger, .ops-guide-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            border-radius: 30px;
            padding: 12px 28px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* AI 助理按鈕特有樣式 */
        .ai-chat-trigger {
            background-color: var(--primary-green);
            color: white;
            box-shadow: 0 4px 14px rgba(46, 125, 50, 0.2);
        }
        
        .ai-chat-trigger:hover { 
            transform: translateY(-2px); 
            background-color: #1B5E20;
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.3);
        }

        /* 📊 OPS Guide 按鈕特有樣式（走清爽的綠色邊框風格，與 AI 按鈕做出視覺區隔） */
        .ops-guide-btn {
            background-color: var(--pure-white);
            color: var(--primary-green);
            border: 2px solid var(--primary-green);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.03);
        }

        .ops-guide-btn:hover {
            transform: translateY(-2px);
            background-color: #E8F5E9; /* 輕微的綠色提亮背景 */
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.1);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .process-card {
            border: 2px solid var(--border-soft);
            border-radius: 14px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.03);
            min-height: 140px;
        }

        /* White base style for cards WITHOUT images */
        .process-card.no-image {
            background-color: var(--pure-white);
        }

        /* Grey base style for cards WITH images */
        .process-card.has-image {
            background-color: var(--card-has-img);
        }

        .process-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-green);
            box-shadow: 0 12px 24px rgba(46, 125, 50, 0.08);
            background-color: #F4FAF4; 
        }

        .process-card .step-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--primary-green);
            line-height: 1.4;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(27, 94, 32, 0.4); 
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--pure-white);
            border: 1px solid var(--border-soft);
            width: 92%;
            max-width: 1000px; 
            height: 85vh;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 24px 50px rgba(0,0,0,0.15);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 24px 35px;
            border-bottom: 1px solid var(--border-soft);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #F7F9F7;
        }

        .modal-header h2 {
            color: var(--primary-green);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2.2rem;
            cursor: pointer;
            color: #A0A5A0;
            transition: color 0.2s;
            line-height: 1;
        }

        .close-btn:hover {
            color: var(--accent-green);
        }

        .modal-body {
            padding: 35px;
            overflow-y: auto; 
            flex: 1;
            display: flex;
            flex-direction: column; 
            gap: 30px; 
        }

        .modal-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #FAFAFA;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-soft);
        }

        .toolbar-group {
            display: flex;
            gap: 10px;
        }

        .text-content-area {
            color: #333333;
            line-height: 1.6;
            font-size: 1.05rem;
            background: #FFFFFF;
            padding: 10px 5px;
        }

        .text-content-area h3 {
            color: var(--primary-green);
            margin: 25px 0 10px 0;
            font-size: 1.3rem;
            border-bottom: 1px solid #E8EBE8;
            padding-bottom: 5px;
        }

        .text-content-area h4 {
            color: var(--text-dark-green);
            margin: 15px 0 8px 0;
            font-size: 1.15rem;
            font-weight: 600;
        }

        .text-content-area h3:first-child {
            margin-top: 0;
        }

        .text-content-area p {
            margin-bottom: 12px;
        }

        .text-content-area ul {
            margin-left: 25px;
            margin-bottom: 15px;
        }

        .text-content-area li {
            margin-bottom: 6px;
        }

        .image-outer-wrapper {
            background: #FAFAFA;
            border-radius: 12px;
            border: 1px solid var(--border-soft);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        .zoom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--pure-white);
            padding: 8px 15px;
            border-radius: 6px;
            border: 1px solid var(--border-soft);
        }

        .zoom-btn-group {
            display: flex;
            gap: 10px;
        }

        .zoom-control-btn {
            background-color: transparent;
            color: var(--primary-green);
            border: 1px solid var(--primary-green);
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .zoom-control-btn:hover {
            background-color: var(--primary-green);
            color: var(--pure-white);
        }

        .edit-doc-btn {
            background-color: var(--primary-green) !important;
            color: white !important;
            border: 1px solid var(--primary-green) !important;
        }
        .edit-doc-btn:hover {
            background-color: #1B5E20 !important;
        }

        .lucid-link-btn {
            background-color: var(--lucid-blue) !important;
            color: white !important;
            border: 1px solid var(--lucid-blue) !important;
        }
        .lucid-link-btn:hover {
            background-color: #1565C0 !important;
        }

        .image-scroll-box {
            overflow-y: visible;    
            overflow-x: auto;       
            background: #FFFFFF;
            border: 1px solid #EEEEEE;
            border-radius: 6px;
            padding: 10px;
            position: relative;
        }

        .process-image {
            width: 100%;            
            height: auto;
            display: block;
            margin: 0 auto;
            transition: transform 0.2s ease; 
            transform-origin: top center;    
        }

        .discussion-box {
            margin-top: 20px;
            padding-top: 25px;
            border-top: 2px solid var(--border-soft);
        }
        .discussion-box h3 {
            font-size: 1.3rem;
            color: var(--primary-green);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Demand Planning Global Process Standardization</h1>
        <div class="header-btn-container">
            <button class="ops-guide-btn" onclick="openOpsGuide()">📊 OPS Guide</button>
            <button class="ai-chat-trigger" onclick="toggleAIChat()">🤖 Demand Planning SOP Assistant</button>
        </div>
    </header>

    <div class="grid-container" id="gridContainer"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Process Name</h2>
                <button class="close-btn" id="closeBtn">&times;</button>
            </div>
            <div class="modal-body">
                
                <div class="modal-toolbar">
                    <div class="toolbar-group">
                        <span style="font-size: 0.9rem; color: #666; font-weight: 600;">📝 Document Context</span>
                    </div>
                    <div class="toolbar-group">
                        <button class="zoom-control-btn edit-doc-btn" id="editDocBtn" onclick="openGoogleDocEditor()">✏️ Edit Google Doc</button>
                    </div>
                </div>

                <div class="text-content-area" id="textContentArea"></div>
                
                <div class="image-outer-wrapper" id="imageOuterWrapper">
                    <div class="zoom-bar">
                        <div class="zoom-btn-group">
                            <button class="zoom-control-btn" onclick="adjustZoom(0.2)">Zoom In +</button>
                            <button class="zoom-control-btn" onclick="adjustZoom(-0.2)">Zoom Out -</button>
                            <button class="zoom-control-btn" onclick="resetZoom()">Reset</button>
                        </div>
                        <div>
                            <button class="zoom-control-btn lucid-link-btn" id="lucidLinkBtn" onclick="openLucidchartLink()">📊 Open Lucidchart</button>
                        </div>
                    </div>
                    <div class="image-scroll-box">
                        <img src="" alt="Process Map Diagram" class="process-image" id="processImg">
                    </div>
                </div>

                <div class="discussion-box">
                    <h3>💬 Process Q&A & Threaded Discussions</h3>
                    <div id="giscusContainer"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // 指向 GitHub 儲存庫的最外層（根目錄）
        const githubRawBaseUrl = "https://raw.githubusercontent.com/wlee5-design/demand-planning/main/";

        const stepsData = [
            { 
                id: 1, 
                title: "ASP management", 
                editUrl: "https://docs.google.com/document/d/1G3Soa58AG3H-IbX6xaDrlLJq1mg5dRRFubhCcTdRCTI/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/680b898a-5f3b-4c4b-9209-b582c8e9a1d1/edit?viewport_loc=105%2C-72%2C3517%2C1615%2Ct5f0BNooez5S3&invitationId=inv_269e195c-87ce-4f8a-9f89-c40413f9da37", 
                imgSrc: "ASP management@.png",
                contentFile: "ASP management.md"
            },
            { 
                id: 2, 
                title: "WOH management", 
                editUrl: "https://docs.google.com/document/d/17B6Zf2H1yo3WEMMyjr_P9ufp7ZsYnruQMfWtJkd1F1c/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/14f54d95-586a-419f-a2d2-db04a7a3eab6/edit?viewport_loc=28%2C304%2C1781%2C818%2Ckfud8kSUKrbUF&invitationId=inv_3ccce988-a35f-41c3-8699-9ec60ee64d2e", 
                imgSrc: "WOH Management @.png",
                contentFile: "WOH management.md"
            },
            { 
                id: 3, 
                title: "Return Rate management", 
                editUrl: "https://docs.google.com/document/d/1OP1Rp0VF4pVpvj7cIlMXDXHEP6bJcYMhs-mXPAle6fE/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/e20529ab-eda4-483f-b733-7606bf152c6f/edit?viewport_loc=-111%2C139%2C2159%2C991%2C7pF14CYle6Yij&invitationId=inv_afb404d8-41b5-4b7a-9a58-def3c8263ee6", 
                imgSrc: "Return Rate management@.png",
                contentFile: "Return Rate management.md"
            },
            { 
                id: 4, 
                title: "DCS/SI carryover", 
                editUrl: "https://docs.google.com/document/d/1V3RCdP_6TSkLc8WPpcx8EM1K7YEAZcO214qX9gRpTcA/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/773793f6-4abd-441c-bbf4-2d8cc1e5620c/edit?viewport_loc=240%2C305%2C3476%2C1596%2C5rtcIwgxVf2ml&invitationId=inv_304f2d92-3fc7-48f4-9b33-ab0e2a77fec1", 
                imgSrc: "DCS SI Carryover@.png",
                contentFile: "DCS SI carryover.md"
            },
            { 
                id: 5, 
                title: "Channel Correction", 
                editUrl: "https://docs.google.com/document/d/1hpaGN1-y2VfXsAxq63jd_QFNQorttk9afXzEY-JqzWo/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/7414911c-0d77-45e6-a1f7-123e049e2ea3/edit?viewport_loc=358%2C225%2C2682%2C1231%2CocMggXGJ3kdmr&invitationId=inv_2144b9a8-54c1-408e-9116-8905e7d2f61f", 
                imgSrc: "Channel Correction@.png", 
                contentFile: "Channel Correction.md"
            },
            { 
                id: 6, 
                title: "Backlog management", 
                editUrl: "https://docs.google.com/document/d/1jLRZ_X9qbXQ70LBaU24BE7CKIAZYkkHwRH6A9YHMIvs/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/9832cc5a-e8f6-4543-bb54-23ed982dcc88/edit?viewport_loc=222%2C223%2C2647%2C1215%2ChIdtkivSAJbAd&invitationId=inv_368f83ee-d5ca-41dc-bcf7-a61b9d251677", 
                imgSrc: "Backlog management@.png", 
                contentFile: "Backlog management.md"
            },
            { 
                id: 7, 
                title: "NPI", 
                editUrl: "https://docs.google.com/document/d/1NmUAM8uwIgWhnU9eaUl1npf26h8GMMe5bv79pdVV_xA/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/bdba74dc-e553-420d-a4a3-46ae280101ab/edit?viewport_loc=64%2C-93%2C6115%2C2808%2C1eaPQgkh9kd2u&invitationId=inv_8b51bacc-dcd3-493d-bcd6-ac7675d4a852", 
                imgSrc: "NPI@.drawio (2).png", 
                contentFile: "NPI.md"
            },
            { 
                id: 8, 
                title: "PIPO", 
                editUrl: "https://docs.google.com/document/d/1_g24nECB_6t0iS1bmEhtFJKBhCyRn0bHWpiC4Urh410/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/eda2e3e8-20b5-4a9b-ad07-0baeff29bb1c/edit?viewport_loc=187%2C187%2C2972%2C1365%2C7oy5SD2QaNaMp&invitationId=inv_7c076807-f33c-4810-97da-e4f441c5b593", 
                imgSrc: "PIPO@.drawio (3).png", 
                contentFile: "PIPO.md"
            },
            { 
                id: 9, 
                title: "Event Handling", 
                editUrl: "https://docs.google.com/document/d/1XyJhZ6-BH1EDDYUfQx_ffmU_ymdI1KOCJ0NZIAFzcwM/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/b7653921-ee34-48b8-95ee-f9d74290562c/edit?viewport_loc=216%2C-509%2C6494%2C2982%2CWNXwqeS0xBqxg&invitationId=inv_8ec9dbbe-40be-466d-ae0d-ab541169c133", 
                imgSrc: "Event Handling@.drawio (1).png", 
                contentFile: "Event Handling.md"
            },
            { id: 10, title: "Account Level Planning", editUrl: "", lucidUrl: "", imgSrc: "", htmlContent: "" },
            { id: 11, title: "Monthly Planning", editUrl: "", lucidUrl: "", imgSrc: "", htmlContent: "" },
            { id: 12, title: "Strategy and assumptions documentation", editUrl: "", lucidUrl: "", imgSrc: "", htmlContent: "" },
            { id: 13, title: "Demand Plan Frozen Window", editUrl: "", lucidUrl: "", imgSrc: "", htmlContent: "" },
            { id: 14, title: "One Page market data analysis", editUrl: "", lucidUrl: "", imgSrc: "", htmlContent: "" },
            { id: 15, title: "Forecast Accy deep dive", editUrl: "", lucidUrl: "", imgSrc: "", htmlContent: "" },
            { id: 16, title: "Direct Shipment Process", editUrl: "", lucidUrl: "", imgSrc: "", htmlContent: "" },
            { id: 17, title: "Plannable flag", editUrl: "", lucidUrl: "", imgSrc: "", htmlContent: "" },
            { id: 18, title: "Forecast Consumption management", editUrl: "", lucidUrl: "", imgSrc: "", htmlContent: "" },
            { 
                id: 19, 
                title: "DTX Accessory Planning", 
                editUrl: "https://docs.google.com/document/d/1_XeOAPVKRv9ghKRI6mhcox2aQGbrn9kbMzCB-xSD34A/edit?usp=sharing", 
                lucidUrl: "https://lucid.app/lucidchart/de7e8bb2-6acc-4c5b-81d9-86156df4516f/edit?viewport_loc=240%2C131%2C3222%2C1479%2CsqRktaucYBbup&invitationId=inv_213e1178-775b-4572-a8f2-fd87e1ef9fab", 
                imgSrc: "DTX @.drawio (1).png", 
                contentFile: "DTX Accessory Planning.md"
            },
            { id: 20, title: "Accessory Planning Criteria", editUrl: "", lucidUrl: "", imgSrc: "", htmlContent: "" }
        ];

        const container = document.getElementById('gridContainer');
        const overlay = document.getElementById('modalOverlay');
        const closeBtn = document.getElementById('closeBtn');
        const modalTitle = document.getElementById('modalTitle');
        const textContentArea = document.getElementById('textContentArea');
        const processImg = document.getElementById('processImg');
        const imgOuterWrapper = document.getElementById('imageOuterWrapper');
        
        let zoomScale = 1;
        let currentActiveEditUrl = ""; 
        let currentActiveLucidUrl = ""; 

        stepsData.forEach(step => {
            const card = document.createElement('div');
            
            if (step.imgSrc && step.imgSrc.trim() !== "") {
                card.className = 'process-card has-image'; 
            } else {
                card.className = 'process-card no-image';  
            }
            
            card.innerHTML = `<div class="step-title">${step.title}</div>`;
            card.addEventListener('click', () => openModal(step));
            container.appendChild(card);
        });

        function openModal(step) {
            modalTitle.innerText = step.title;
            currentActiveEditUrl = step.editUrl; 
            currentActiveLucidUrl = step.lucidUrl; 

            if (step.contentFile && step.contentFile.trim() !== "") {
                textContentArea.innerHTML = "<p style='color:#666;'>⏳ Loading process details from GitHub...</p>";
                textContentArea.style.display = 'block';

                const safeFileName = encodeURIComponent(step.contentFile);
                const targetUrl = githubRawBaseUrl + safeFileName;
                
                fetch(targetUrl)
                    .then(response => {
                        if (!response.ok) throw new Error("GitHub file not found");
                        return response.text();
                    })
                    .then(markdownData => {
                        textContentArea.innerHTML = marked.parse(markdownData);
                    })
                    .catch(error => {
                        console.error(error);
                        textContentArea.innerHTML = `<p style='color:#cc0000;'>❌ Failed to load content from GitHub.<br><small>Please verify that the file <strong>${step.contentFile}</strong> exists in your repository root.</small></p>`;
                    });

            } else if (step.htmlContent && step.htmlContent.trim() !== "") {
                textContentArea.innerHTML = step.htmlContent;
                textContentArea.style.display = 'block';
            } else {
                textContentArea.innerHTML = "<p style='color:#999;'>No content details provided yet.</p>";
                textContentArea.style.display = 'block';
            }

            if (step.editUrl && step.editUrl.trim() !== "") {
                document.getElementById('editDocBtn').style.display = 'inline-block';
            } else {
                document.getElementById('editDocBtn').style.display = 'none';
            }

            if (step.lucidUrl && step.lucidUrl.trim() !== "") {
                document.getElementById('lucidLinkBtn').style.display = 'inline-block';
            } else {
                document.getElementById('lucidLinkBtn').style.display = 'none';
            }

            if (step.imgSrc && step.imgSrc.trim() !== "") {
                processImg.src = step.imgSrc;
                imgOuterWrapper.style.display = 'flex';
            } else {
                imgOuterWrapper.style.display = 'none'; 
            }

            loadGithubDiscussions(step.title);
            resetZoom(); 
            overlay.classList.add('active');
            document.querySelector('.modal-body').scrollTop = 0; 
        }

        function openGoogleDocEditor() {
            if (currentActiveEditUrl && currentActiveEditUrl.trim() !== "") {
                window.open(currentActiveEditUrl, '_blank');
            } else {
                alert("No editor link assigned to this process.");
            }
        }

        function openLucidchartLink() {
            if (currentActiveLucidUrl && currentActiveLucidUrl.trim() !== "") {
                window.open(currentActiveLucidUrl, '_blank');
            } else {
                alert("No Lucidchart link assigned to this process diagram.");
            }
        }

        /* 💡 新增：開啟 OPS Guide 簡報連結的函式 */
        function openOpsGuide() {
            window.open('https://docs.google.com/presentation/d/1cbAnvojSkH5teuSn1MF7fbXorp2Lx4_uwiNqKWgAp5k/edit?usp=sharing', '_blank');
        }

        function toggleAIChat() {
            window.open('https://logiq.logitech.io/share/assistant/b32d00bf-a51d-45c2-a730-93dbd3946054', '_blank');
        }

        function adjustZoom(amount) {
            zoomScale += amount;
            if (zoomScale < 0.5) zoomScale = 0.5;  
            if (zoomScale > 3.0) zoomScale = 3.0;  
            processImg.style.transform = `scale(${zoomScale})`;
            processImg.style.width = (zoomScale > 1) ? 'auto' : '100%';
        }

        function resetZoom() {
            zoomScale = 1;
            processImg.style.transform = `scale(${zoomScale})`;
            processImg.style.width = '100%';
        }

        closeBtn.addEventListener('click', () => overlay.classList.remove('active'));
        overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.classList.remove('active'); });
