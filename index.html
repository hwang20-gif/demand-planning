<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demand Planning Global Process Standardization</title>

    <style>
        :root {
            --primary-green: #2E7D32;   
            --accent-green: #00C853;    
            --bg-warm-white: #FAF9F6;   
            --pure-white: #FFFFFF;      
            --text-dark-green: #1B5E20; 
            --border-soft: #E0E4E0;     
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-warm-white);
            color: var(--primary-green);
            padding: 60px 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            color: var(--primary-green);
            font-size: 2.4rem;
            letter-spacing: 1.5px;
            font-weight: 700;
            line-height: 1.4;
            text-transform: uppercase;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .process-card {
            background-color: var(--pure-white);
            border: 2px solid var(--border-soft);
            border-radius: 14px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.03);
            min-height: 140px;
        }

        .process-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-green);
            box-shadow: 0 12px 24px rgba(46, 125, 50, 0.08);
            background-color: #F4FAF4; 
        }

        .process-card .step-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--primary-green);
            line-height: 1.4;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(27, 94, 32, 0.4); 
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--pure-white);
            border: 1px solid var(--border-soft);
            width: 92%;
            max-width: 1000px; 
            height: 85vh;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 24px 50px rgba(0,0,0,0.15);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 24px 35px;
            border-bottom: 1px solid var(--border-soft);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #F7F9F7;
        }

        .modal-header h2 {
            color: var(--primary-green);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2.2rem;
            cursor: pointer;
            color: #A0A5A0;
            transition: color 0.2s;
            line-height: 1;
        }

        .close-btn:hover {
            color: var(--accent-green);
        }

        .modal-body {
            padding: 35px;
            overflow-y: auto; 
            flex: 1;
            display: flex;
            flex-direction: column; 
            gap: 30px; 
        }

        /* 📝 頂部多功能工具列 */
        .modal-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #FAFAFA;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-soft);
        }

        .toolbar-group {
            display: flex;
            gap: 10px;
        }

        /* 📄 Google Docs 內嵌網頁展示區容器 */
        .docs-iframe-container {
            width: 100%;
            height: 520px; 
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            background: #FFFFFF;
            overflow: hidden;
        }

        .docs-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .image-outer-wrapper {
            background: #FAFAFA;
            border-radius: 12px;
            border: 1px solid var(--border-soft);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        .zoom-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            background: var(--pure-white);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border-soft);
        }

        .zoom-control-btn {
            background-color: transparent;
            color: var(--primary-green);
            border: 1px solid var(--primary-green);
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .zoom-control-btn:hover {
            background-color: var(--primary-green);
            color: var(--pure-white);
        }

        /* ✏️ 一鍵跳轉後台編輯按鈕 */
        .edit-doc-btn {
            background-color: var(--primary-green) !important;
            color: white !important;
            border: 1px solid var(--primary-green) !important;
        }
        .edit-doc-btn:hover {
            background-color: #1B5E20 !important;
        }

        .image-scroll-box {
            overflow-y: visible;    
            overflow-x: auto;       
            background: #FFFFFF;
            border: 1px solid #EEEEEE;
            border-radius: 6px;
            padding: 10px;
            position: relative;
        }

        .process-image {
            width: 100%;            
            height: auto;
            display: block;
            margin: 0 auto;
            transition: transform 0.2s ease; 
            transform-origin: top center;    
        }

        /* 🤖 Logi Q 右下角浮動按鈕樣式 */
        .ai-chat-trigger {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(46,125,50,0.3);
            z-index: 2000;
            transition: transform 0.2s;
        }
        .ai-chat-trigger:hover { transform: scale(1.05); }

        /* 💬 GitHub 官方 Q&A 面板容器 */
        .discussion-box {
            margin-top: 20px;
            padding-top: 25px;
            border-top: 2px solid var(--border-soft);
        }
        .discussion-box h3 {
            font-size: 1.3rem;
            color: var(--primary-green);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Demand Planning Global Process Standardization</h1>
    </header>

    <div class="grid-container" id="gridContainer"></div>

    <button class="ai-chat-trigger" onclick="toggleAIChat()">🤖</button>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Process Name</h2>
                <button class="close-btn" id="closeBtn">&times;</button>
            </div>
            <div class="modal-body">
                
                <div class="modal-toolbar">
                    <div class="toolbar-group" id="imageZoomTools">
                        <button class="zoom-control-btn" onclick="adjustZoom(0.2)">Zoom In +</button>
                        <button class="zoom-control-btn" onclick="adjustZoom(-0.2)">Zoom Out -</button>
                        <button class="zoom-control-btn" onclick="resetZoom()">Reset View</button>
                    </div>
                    <div class="toolbar-group">
                        <button class="zoom-control-btn edit-doc-btn" id="editDocBtn" onclick="openGoogleDocEditor()">✏️ Edit Google Doc</button>
                    </div>
                </div>

                <div class="docs-iframe-container" id="docsContainer">
                    <iframe src="" class="docs-iframe" id="docsIframe"></iframe>
                </div>
                
                <div class="image-outer-wrapper" id="imageOuterWrapper">
                    <div class="zoom-bar">
                        <button class="zoom-control-btn" onclick="adjustZoom(0.2)">Zoom In +</button>
                        <button class="zoom-control-btn" onclick="adjustZoom(-0.2)">Zoom Out -</button>
                        <button class="zoom-control-btn" onclick="resetZoom()">Reset</button>
                    </div>
                    <div class="image-scroll-box">
                        <img src="" alt="Process Map Diagram" class="process-image" id="processImg">
                    </div>
                </div>

                <div class="discussion-box">
                    <h3>💬 Process Q&A & Threaded Discussions</h3>
                    <div id="giscusContainer"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const stepsData = [
            // 🚨🚨🚨 請在下方引號中填入各流程對應的 Google Docs 連結（docUrl = 發布到網路網址，editUrl = 後台原本直接打字修改的網址） 🚨🚨🚨
            { 
                id: 1, 
                title: "ASP management", 
                docUrl: "https://docs.google.com/document/d/e/這裡填入_ASP文件_發布到網路ID/pub", 
                editUrl: "https://docs.google.com/document/d/這裡填入_ASP文件_原本後台編輯網址/edit", 
                imgSrc: "ASP management@.png" 
            },
            { 
                id: 2, 
                title: "WOH management", 
                docUrl: "https://docs.google.com/document/d/e/這裡填入_WOH文件_發布到網路ID/pub", 
                editUrl: "https://docs.google.com/document/d/這裡填入_WOH文件_原本後台編輯網址/edit", 
                imgSrc: "WOH Management @.png" 
            },
            { 
                id: 3, 
                title: "Return Rate management", 
                docUrl: "https://docs.google.com/document/d/e/這裡填入文件_發布到網路ID/pub", 
                editUrl: "https://docs.google.com/document/d/這裡填入文件_原本後台編輯網址/edit", 
                imgSrc: "Return Rate management@.png" 
            },
            { 
                id: 4, 
                title: "DCS/SI carryover", 
                docUrl: "https://docs.google.com/document/d/e/這裡填入_DCS文件_發布到網路ID/pub", 
                editUrl: "https://docs.google.com/document/d/這裡填入_DCS文件_原本後台編輯網址/edit", 
                imgSrc: "DCS SI Carryover@.png" 
            },
            { id: 5, title: "Channel Correction", docUrl: "", editUrl: "", imgSrc: "Channel Correction@.png" },
            { id: 6, title: "Backlog management", docUrl: "", editUrl: "", imgSrc: "Backlog management@.png" },
            { id: 7, title: "NPI", docUrl: "", editUrl: "", imgSrc: "NPI@.drawio (2).png" },
            { id: 8, title: "PIPO", docUrl: "", editUrl: "", imgSrc: "PIPO@.drawio (3).png" },
            { id: 9, title: "Event Handling", docUrl: "", editUrl: "", imgSrc: "Event Handling@.drawio (1).png" },
            { id: 10, title: "Account Level Planning", docUrl: "", editUrl: "", imgSrc: "" },
            { id: 11, title: "Monthly Planning", docUrl: "", editUrl: "", imgSrc: "" },
            { id: 12, title: "Strategy and assumptions documentation", docUrl: "", editUrl: "", imgSrc: "" },
            { id: 13, title: "Demand Plan Frozen Window", docUrl: "", editUrl: "", imgSrc: "" },
            { id: 14, title: "One Page market data analysis", docUrl: "", editUrl: "", imgSrc: "" },
            { id: 15, title: "Forecast Accy deep dive", docUrl: "", editUrl: "", imgSrc: "" },
            { id: 16, title: "Direct Shipment Process", docUrl: "", editUrl: "", imgSrc: "" },
            { id: 17, title: "Plannable flag", docUrl: "", editUrl: "", imgSrc: "" },
            { id: 18, title: "Forecast Consumption management", docUrl: "", editUrl: "", imgSrc: "" },
            { id: 19, title: "DTX Accessory Planning", docUrl: "", editUrl: "", imgSrc: "DTX @.drawio (1).png" },
            { id: 20, title: "Accessory Planning Criteria", docUrl: "", editUrl: "", imgSrc: "" }
        ];

        const container = document.getElementById('gridContainer');
        const overlay = document.getElementById('modalOverlay');
        const closeBtn = document.getElementById('closeBtn');
        const modalTitle = document.getElementById('modalTitle');
        const docsContainer = document.getElementById('docsContainer');
        const docsIframe = document.getElementById('docsIframe');
        const processImg = document.getElementById('processImg');
        const imgOuterWrapper = document.getElementById('imageOuterWrapper');
        
        let zoomScale = 1;
        let currentActiveEditUrl = ""; // 用於暫存被點開流程的 Google Doc 後台改字網址

        stepsData.forEach(step => {
            const card = document.createElement('div');
            card.className = 'process-card';
            card.innerHTML = `<div class="step-title">${step.title}</div>`;
            card.addEventListener('click', () => openModal(step));
            container.appendChild(card);
        });

        function openModal(step) {
            modalTitle.innerText = step.title;
            currentActiveEditUrl = step.editUrl; // 儲存該流程的編輯連結

            // 📄 1. 處理 Google Docs 的內嵌動態渲染
            if (step.docUrl && step.docUrl.trim() !== "") {
                docsIframe.src = step.docUrl;
                docsContainer.style.display = 'block';
            } else {
                docsIframe.src = "about:blank";
                docsContainer.style.display = 'none';
            }

            // ✏️ 2. 控制「Edit Google Doc 按鈕」隱現 (沒填後台連結就不顯示按鈕)
            if (step.editUrl && step.editUrl.trim() !== "") {
                document.getElementById('editDocBtn').style.display = 'inline-block';
            } else {
                document.getElementById('editDocBtn').style.display = 'none';
            }

            // 🖼️ 3. 處理卡片內流程圖圖片與縮放
            if (step.imgSrc && step.imgSrc.trim() !== "") {
                processImg.src = step.imgSrc;
                imgOuterWrapper.style.display = 'flex';
                document.getElementById('imageZoomTools').style.display = 'flex';
            } else {
                imgOuterWrapper.style.display = 'none'; 
                document.getElementById('imageZoomTools').style.display = 'none';
            }

            // ⚡ 4. 呼叫 GitHub 官方安全通道，自動依卡片名稱載入 Q&A 獨立對話串
            loadGithubDiscussions(step.title);

            resetZoom(); 
            overlay.classList.add('active');
            document.querySelector('.modal-body').scrollTop = 0; 
        }

        /* 💡 快捷鍵核心跳轉：另開分頁直接開啟 Google Doc 編輯後台 */
        function openGoogleDocEditor() {
            if (currentActiveEditUrl && currentActiveEditUrl.trim() !== "") {
                window.open(currentActiveEditUrl, '_blank');
            } else {
                alert("No editor link assigned to this process.");
            }
        }

        function adjustZoom(amount) {
            zoomScale += amount;
            if (zoomScale < 0.5) zoomScale = 0.5;  
            if (zoomScale > 3.0) zoomScale = 3.0;  
            processImg.style.transform = `scale(${zoomScale})`;
            processImg.style.width = (zoomScale > 1) ? 'auto' : '100%';
        }

        function resetZoom() {
            zoomScale = 1;
            processImg.style.transform = `scale(${zoomScale})`;
            processImg.style.width = '100%';
        }

        closeBtn.addEventListener('click', () => overlay.classList.remove('active'));
        overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.classList.remove('active'); });

        function toggleAIChat() {
            window.open('https://logiq.logitech.io/share/assistant/b32d00bf-a51d-45c2-a730-93dbd3946054', '_blank');
        }

        /* 🤖 呼叫 GitHub 官方通道，精準分流並渲染 Q&A 執行緒 */
        function loadGithubDiscussions(processTitle) {
            const container = document.getElementById('giscusContainer');
            container.innerHTML = ''; 

            const script = document.createElement('script');
            script.src = "https://giscus.app/client.js";
            
            // 🎯 已完美綁定你專屬的 wlee5-design 儲存庫配置參數
            script.setAttribute("data-repo", "wlee5-design/demand-planning"); 
            script.setAttribute("data-repo-id", "R_kgDOS99Z8A");
            script.setAttribute("data-category", "Q&A");
            script.setAttribute("data-category-id", "DIC_kwDOS99Z8M4C_h01");
            
            // 讓討論串以卡片名稱 (processTitle) 作為唯一分流 term
            script.setAttribute("data-mapping", "specific");
            script.setAttribute("data-term", processTitle);
            
            script.setAttribute("data-strict", "1");
            script.setAttribute("data-reactions-enabled", "1");
            script.setAttribute("data-emit-metadata", "0");
            script.setAttribute("data-input-position", "bottom");
            script.setAttribute("data-theme", "light");
            script.setAttribute("data-lang", "en");
            script.crossOrigin = "anonymous";
            script.async = true;

            container.appendChild(script);
        }
    </script>
</body>
</html>
